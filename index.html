<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FENLORA CLOUD — Panel del Negocio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Figtree:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#080D1A;--surface:#0E1525;--card:#141E33;--card2:#1A2540;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);
  --primary:#00E5A0;--primary-dim:rgba(0,229,160,.12);--primary-dim2:rgba(0,229,160,.06);
  --amber:#F5A623;--amber-dim:rgba(245,166,35,.14);
  --red:#FF4D6D;--red-dim:rgba(255,77,109,.12);
  --blue:#3B82F6;--blue-dim:rgba(59,130,246,.12);
  --purple:#A78BFA;--purple-dim:rgba(167,139,250,.14);
  --txt:#F0F4FF;--txt2:#8892A4;--txt3:#4A5568;
  --sidebar-w:246px;--hdr:60px;
}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:'Figtree',sans-serif;overflow:hidden}
.app{display:flex;height:100vh}
.sidebar{width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;z-index:10}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.hdr{height:var(--hdr);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 26px;flex-shrink:0}
.content{flex:1;overflow-y:auto;padding:26px;scrollbar-width:thin;scrollbar-color:var(--card2) transparent}
.content::-webkit-scrollbar{width:8px}.content::-webkit-scrollbar-thumb{background:var(--card2);border-radius:8px}

/* TABS (browser-style) */
.tabstrip{display:flex;align-items:center;gap:3px;background:var(--surface);border-bottom:1px solid var(--border);padding:7px 12px 0;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
.tabstrip::-webkit-scrollbar{display:none}
.tab{display:flex;align-items:center;gap:8px;padding:9px 13px;border-radius:9px 9px 0 0;background:transparent;color:var(--txt2);font-size:12.5px;font-weight:500;cursor:pointer;white-space:nowrap;border:1px solid transparent;border-bottom:none;position:relative;top:1px;max-width:200px}
.tab:hover{background:var(--card);color:var(--txt)}
.tab.active{background:var(--bg);color:var(--txt);border-color:var(--border)}
.tab .ti{font-size:13px;flex-shrink:0}
.tab .tl{overflow:hidden;text-overflow:ellipsis}
.tab .tx{width:17px;height:17px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--txt3);flex-shrink:0}
.tab .tx:hover{background:var(--red-dim);color:var(--red)}
.tab .pin{font-size:11px;color:var(--txt3)}
.tab.dragging{opacity:.4}
.tab.dragover{border-left:2px solid var(--primary)}
.tab-actions{margin-left:auto;flex-shrink:0;padding-left:8px}
.closeall{display:flex;align-items:center;gap:6px;background:transparent;border:1px solid var(--border);color:var(--txt2);font-size:11.5px;font-weight:600;padding:6px 11px;border-radius:8px;cursor:pointer;white-space:nowrap;font-family:inherit;margin-bottom:6px}
.closeall:hover{border-color:var(--red);color:var(--red);background:var(--red-dim)}
.ctxmenu{position:fixed;z-index:200;background:var(--card);border:1px solid var(--border2);border-radius:10px;padding:5px;min-width:190px;box-shadow:0 16px 40px -10px rgba(0,0,0,.7);display:none}
.ctxmenu.on{display:block}
.ctxmenu .ci{padding:9px 12px;border-radius:7px;font-size:12.5px;color:var(--txt);cursor:pointer;display:flex;align-items:center;gap:9px}
.ctxmenu .ci:hover{background:var(--primary-dim);color:var(--primary)}
.ctxmenu .ci.disabled{color:var(--txt3);pointer-events:none;opacity:.5}
.ctxmenu .sep{height:1px;background:var(--border);margin:4px 6px}
.toast-t{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--card);border:1px solid var(--amber);color:var(--amber);font-size:13px;font-weight:600;padding:11px 20px;border-radius:11px;z-index:300;opacity:0;transition:.3s;pointer-events:none}
.toast-t.on{opacity:1;transform:translateX(-50%) translateY(0)}
.tabpanel{display:none}
.tabpanel.on{display:block}

/* ─── TOMAR PEDIDO ─── */
.tp{display:grid;grid-template-columns:1fr 350px;gap:20px;align-items:start}
.tp-ctx{grid-column:1/-1;display:flex;align-items:center;gap:16px;background:var(--card);border:1px solid var(--border);border-radius:13px;padding:13px 18px;margin-bottom:4px;flex-wrap:wrap}
.tp-ctx .mesa-sel{display:flex;align-items:center;gap:9px;font-family:'Outfit',sans-serif;font-weight:700;font-size:16px}
.tp-ctx .mesa-sel .mm-ic{width:32px;height:32px;border-radius:8px;background:var(--amber-dim);color:var(--amber);display:flex;align-items:center;justify-content:center;font-size:16px}
.tp-ctx .ctx-i{font-size:12px;color:var(--txt2)}.tp-ctx .ctx-i b{color:var(--txt);font-weight:600}
.tp-ctx .divx{width:1px;height:26px;background:var(--border)}
.tp-search2{display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:14px;color:var(--txt3)}
.tp-search2 input{background:none;border:none;outline:none;color:var(--txt);font-family:inherit;font-size:14px;flex:1}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.chip{padding:8px 15px;border-radius:22px;background:var(--card);border:1px solid var(--border);color:var(--txt2);font-size:12.5px;font-weight:600;cursor:pointer;transition:.15s}
.chip:hover{border-color:var(--border2);color:var(--txt)}
.chip.active{background:var(--primary);border-color:var(--primary);color:#052e21}
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(146px,1fr));gap:12px}
.prod{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:14px;cursor:pointer;transition:.15s;position:relative}
.prod:hover{transform:translateY(-2px);border-color:var(--primary);background:var(--card2)}
.prod:active{transform:scale(.97)}
.prod .pe{font-size:30px;margin-bottom:8px}
.prod .pn{font-size:13px;font-weight:600;line-height:1.2;min-height:32px}
.prod .pp{font-family:'Outfit',sans-serif;font-size:15px;font-weight:700;color:var(--primary);margin-top:6px}
.prod .popt{position:absolute;top:10px;right:10px;font-size:9px;font-weight:700;background:var(--amber-dim);color:var(--amber);padding:2px 7px;border-radius:10px}
.prod .padd{position:absolute;bottom:14px;right:12px;width:26px;height:26px;border-radius:50%;background:var(--primary-dim);color:var(--primary);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:300;line-height:0}

/* COMANDA panel */
.comanda{position:sticky;top:0;background:var(--card);border:1px solid var(--border);border-radius:16px;display:flex;flex-direction:column;max-height:calc(100vh - 150px)}
.comanda-h{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.comanda-h b{font-family:'Outfit',sans-serif;font-size:15px;font-weight:700}
.comanda-h .cnt{font-size:11px;color:var(--txt2);background:var(--card2);padding:3px 9px;border-radius:12px;font-weight:600}
.comanda-body{flex:1;overflow-y:auto;padding:12px 14px;scrollbar-width:thin}
.comanda-body::-webkit-scrollbar{width:6px}.comanda-body::-webkit-scrollbar-thumb{background:var(--card2);border-radius:6px}
.empty{text-align:center;color:var(--txt3);padding:40px 20px;font-size:13px}
.empty .ee{font-size:40px;margin-bottom:12px;opacity:.5}
.cl{background:var(--card2);border:1px solid var(--border);border-radius:11px;padding:11px 12px;margin-bottom:9px}
.cl-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.cl-name{font-size:13px;font-weight:600;line-height:1.2}
.cl-opts{font-size:10.5px;color:var(--txt2);margin-top:3px;line-height:1.4}
.cl-rm{color:var(--txt3);cursor:pointer;font-size:13px;flex-shrink:0}.cl-rm:hover{color:var(--red)}
.cl-bot{display:flex;align-items:center;justify-content:space-between;margin-top:9px}
.qstep{display:flex;align-items:center;gap:9px}
.qb{width:25px;height:25px;border-radius:7px;border:1px solid var(--border);background:var(--surface);color:var(--txt);font-size:15px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.qb:hover{border-color:var(--primary);color:var(--primary)}
.qv{font-size:13px;font-weight:700;min-width:14px;text-align:center}
.cl-price{font-family:'Outfit',sans-serif;font-weight:700;font-size:14px;color:var(--primary)}
.comanda-f{border-top:1px solid var(--border);padding:14px 18px}
.trow{display:flex;justify-content:space-between;font-size:12.5px;color:var(--txt2);margin-bottom:7px}
.trow.tot{font-family:'Outfit',sans-serif;font-size:19px;font-weight:700;color:var(--txt);border-top:1px solid var(--border);padding-top:10px;margin-top:3px}
.trow.tot .tv{color:var(--primary)}
.comanda-actions{display:flex;flex-direction:column;gap:8px;margin-top:14px}
.btn{padding:12px;border-radius:10px;border:none;font-family:'Outfit',sans-serif;font-weight:700;font-size:13.5px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:.15s}
.btn:active{transform:scale(.98)}
.btn.primary{background:var(--primary);color:#052e21}
.btn.primary:hover{box-shadow:0 8px 20px -6px rgba(0,229,160,.5)}
.btn.ghost{background:var(--card2);color:var(--txt);border:1px solid var(--border)}
.btn.ghost:hover{border-color:var(--border2)}
.btn.two{flex-direction:row}
.btn-row{display:flex;gap:8px}.btn-row .btn{flex:1}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* OPTIONS MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:150;display:none;align-items:center;justify-content:center;padding:20px}
.modal-bg.on{display:flex}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:16px;width:440px;max-width:100%;max-height:88vh;display:flex;flex-direction:column;box-shadow:0 30px 70px -15px rgba(0,0,0,.7)}
.modal-h{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-h b{font-family:'Outfit',sans-serif;font-size:17px;font-weight:700}
.modal-h .mx{width:32px;height:32px;border-radius:8px;background:var(--card);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--txt2)}
.modal-b{padding:18px 20px;overflow-y:auto}
.optgroup{margin-bottom:20px}
.optgroup .ogt{font-size:12px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:var(--txt2);margin-bottom:10px;display:flex;justify-content:space-between}
.optgroup .req{color:var(--amber);font-size:10px}
.opt{display:flex;align-items:center;justify-content:space-between;padding:11px 13px;border:1px solid var(--border);border-radius:10px;margin-bottom:8px;cursor:pointer;font-size:13.5px;transition:.15s}
.opt:hover{border-color:var(--border2)}
.opt.sel{border-color:var(--primary);background:var(--primary-dim)}
.opt .oc{width:19px;height:19px;border-radius:50%;border:2px solid var(--txt3);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.opt.sel .oc{border-color:var(--primary);background:var(--primary)}
.opt.sel .oc::after{content:'';width:7px;height:7px;border-radius:50%;background:#052e21}
.opt .op{color:var(--primary);font-weight:600;font-size:12.5px}
.modal-f{padding:16px 20px;border-top:1px solid var(--border)}

/* BRAND */
.brand{padding:20px 20px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:11px}
.brand .logo{width:36px;height:36px;border-radius:9px;background:linear-gradient(135deg,var(--primary),#00b381);display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.brand-name{font-family:'Outfit',sans-serif;font-weight:800;font-size:16px;letter-spacing:-.3px}
.brand-sub{font-size:10px;color:var(--primary);letter-spacing:1.4px;text-transform:uppercase;margin-top:1px}

/* NAV */
.nav{padding:12px 10px;flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--card2) transparent}
.nav::-webkit-scrollbar{width:6px}.nav::-webkit-scrollbar-thumb{background:var(--card2);border-radius:6px}
.nav-section{font-size:10px;color:var(--txt3);letter-spacing:1.2px;text-transform:uppercase;padding:14px 10px 6px;font-weight:700}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--txt2);transition:.15s;margin-bottom:1px;font-weight:500;position:relative}
.nav-item:hover{background:var(--primary-dim2);color:var(--txt)}
.nav-item.active{background:var(--primary-dim);color:var(--primary)}
.nav-item .ico{width:17px;text-align:center;font-size:14px;flex-shrink:0}
.nav-item .lbl{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dot.activo{background:var(--primary);box-shadow:0 0 6px var(--primary)}
.dot.construccion{background:var(--amber)}
.dot.pronto{background:var(--txt3)}
.nav-badge{background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px}

/* HEADER */
.hdr-left{display:flex;align-items:center;gap:14px}
.biz-sel{display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--border);border-radius:9px;padding:7px 13px;cursor:pointer;font-size:13px;font-weight:600}
.biz-sel .bl{width:24px;height:24px;border-radius:6px;background:linear-gradient(135deg,#F5A623,#c9761e);display:flex;align-items:center;justify-content:center;font-size:13px}
.biz-sel .cv{color:var(--txt3);font-size:11px}
.search{display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--border);border-radius:9px;padding:8px 13px;width:280px;color:var(--txt3);font-size:13px}
.search input{background:none;border:none;outline:none;color:var(--txt);font-family:inherit;font-size:13px;flex:1}
.hdr-right{display:flex;align-items:center;gap:12px}
.hicon{width:38px;height:38px;border-radius:9px;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;position:relative}
.hicon:hover{border-color:var(--border2)}
.hicon .rd{position:absolute;top:8px;right:9px;width:7px;height:7px;background:var(--red);border-radius:50%;border:2px solid var(--surface)}
.avatar{width:38px;height:38px;border-radius:9px;background:linear-gradient(135deg,var(--primary),#00b381);display:flex;align-items:center;justify-content:center;font-weight:700;color:#062;cursor:pointer}

/* PAGE HEAD */
.page-head{margin-bottom:22px}
.page-head h1{font-family:'Outfit',sans-serif;font-size:24px;font-weight:700;letter-spacing:-.4px;display:flex;align-items:center;gap:12px}
.page-head .sub{color:var(--txt2);font-size:13.5px;margin-top:4px}
.status-pill{font-size:10.5px;font-weight:700;padding:4px 10px;border-radius:20px;letter-spacing:.4px;text-transform:uppercase}
.status-pill.activo{background:var(--primary-dim);color:var(--primary)}
.status-pill.construccion{background:var(--amber-dim);color:var(--amber)}
.status-pill.pronto{background:rgba(255,255,255,.06);color:var(--txt2)}
.fase-tag{font-size:10.5px;font-weight:600;padding:4px 10px;border-radius:20px;background:var(--card2);color:var(--txt2)}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 18px;position:relative;overflow:hidden}
.kpi .kt{font-size:11.5px;color:var(--txt2);font-weight:600;letter-spacing:.2px;display:flex;align-items:center;gap:6px}
.kpi .kv{font-family:'Outfit',sans-serif;font-size:25px;font-weight:700;margin-top:8px;letter-spacing:-.5px}
.kpi .kd{font-size:11.5px;margin-top:5px;font-weight:600}
.kpi .kd.up{color:var(--primary)}.kpi .kd.down{color:var(--red)}.kpi .kd.n{color:var(--txt2)}
.kpi .kico{position:absolute;top:14px;right:16px;font-size:17px;opacity:.5}
.kpi.hl{border-color:rgba(0,229,160,.3);background:linear-gradient(135deg,var(--primary-dim),var(--card))}

/* QUICK ACCESS */
.section-title{font-family:'Outfit',sans-serif;font-size:15px;font-weight:600;margin:26px 0 14px;color:var(--txt);display:flex;align-items:center;gap:9px}
.qa-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px}
.qa{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:16px 12px;text-align:center;cursor:pointer;transition:.16s}
.qa:hover{transform:translateY(-2px);border-color:var(--border2);background:var(--card2)}
.qa .qi{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;margin:0 auto 9px}
.qa .qn{font-size:12px;font-weight:600;color:var(--txt)}
.qa .qs{font-size:9.5px;margin-top:3px}

/* PLACEHOLDER (module not built yet) */
.ph{max-width:720px}
.ph-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px}
.ph-desc{color:var(--txt2);font-size:14px;line-height:1.65;margin-bottom:22px}
.ph-feat-title{font-size:12px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--txt3);margin-bottom:12px}
.ph-feat{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ph-feat .f{display:flex;align-items:flex-start;gap:10px;font-size:13px;color:var(--txt);background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:11px 13px}
.ph-feat .f .fc{color:var(--primary);flex-shrink:0;font-size:13px;margin-top:1px}
.ph-note{margin-top:22px;padding:14px 16px;background:var(--amber-dim);border:1px solid rgba(245,166,35,.25);border-radius:11px;font-size:13px;color:#f5cf8f;display:flex;gap:11px;align-items:flex-start}

/* mini table for mesas preview on dashboard */
.mini-mesas{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:11px}
.mm{border-radius:12px;padding:14px;color:#fff;position:relative;min-height:78px}
.mm.libre{background:linear-gradient(135deg,#12a56f,#0c7d54)}
.mm.ocup{background:linear-gradient(135deg,#d98a1f,#b56e12)}
.mm.cobr{background:linear-gradient(135deg,#c9384f,#9e2739)}
.mm .mn{font-weight:700;font-size:14px}
.mm .ms{font-size:10.5px;opacity:.9;margin-top:2px}
.mm .mp{position:absolute;bottom:12px;right:13px;font-weight:700;font-size:13px}
@media(max-width:1180px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.qa-grid{grid-template-columns:repeat(4,1fr)}.ph-feat{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="brand">
      <div class="logo">🔥</div>
      <div><div class="brand-name">FENLORA CLOUD</div><div class="brand-sub">Panel del negocio</div></div>
    </div>
    <nav class="nav" id="nav"></nav>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <header class="hdr">
      <div class="hdr-left">
        <div class="biz-sel"><span class="bl">🍖</span><div>El Fogón<div class="cv">Sede Centro</div></div><span style="color:var(--txt3)">▾</span></div>
        <div class="search">🔎<input placeholder="Buscar opción del menú…"><span style="font-size:11px">Ctrl K</span></div>
      </div>
      <div class="hdr-right">
        <div class="hicon">🌙</div>
        <div class="hicon">🔔<span class="rd"></span></div>
        <div class="avatar">A</div>
      </div>
    </header>
    <div class="tabstrip" id="tabbar"></div>
    <div class="content" id="content"></div>
  </div>
</div>
<div class="ctxmenu" id="ctxmenu"></div>
<div class="toast-t" id="toastT"></div>
<div class="modal-bg" id="optModal"></div>

<script>
/* ─── ESTRUCTURA DEL PANEL (data-driven) ─── */
const S = {
  // OPERACIÓN

const content=document.getElementById('content');
const tabbar=document.getElementById('tabbar');
const ctxmenu=document.getElementById('ctxmenu');
const MAX_TABS=8;
let openTabs=['panel'], active=null;
const scrollPos={};
const tName=k=>k==='panel'?'Panel':S[k].n;
const tIco =k=>k==='panel'?'📊':S[k].ico;

function toastT(msg){
  const t=document.getElementById('toastT');t.textContent=msg;t.classList.add('on');
  clearTimeout(window._tt);window._tt=setTimeout(()=>t.classList.remove('on'),2200);
}

function renderTabs(){
  const closable=openTabs.filter(k=>k!=='panel').length;
  tabbar.innerHTML=openTabs.map((k,idx)=>`
    <div class="tab${k===active?' active':''}" draggable="true" data-idx="${idx}" data-k="${k}"
      onclick="switchTab('${k}')"
      onauxclick="if(event.button===1){event.preventDefault();closeTab('${k}')}"
      oncontextmenu="showCtx(event,'${k}')">
      <span class="ti">${tIco(k)}</span><span class="tl">${tName(k)}</span>
      ${k==='panel'?'<span class="pin">📌</span>':`<span class="tx" onclick="event.stopPropagation();closeTab('${k}')">✕</span>`}
    </div>`).join('') + (closable>0?`<div class="tab-actions"><button class="closeall" onclick="closeAll()">✕ Cerrar todas</button></div>`:'');
  wireDrag();
}
function buildPanel(k){
  const d=document.createElement('div');d.className='tabpanel';d.dataset.k=k;
  d.innerHTML = k==='panel' ? dashboard() : k==='pedido' ? pedidoView() : moduleView(k);
  content.appendChild(d);
  if(k==='pedido') initPedido();
}
function switchTab(k){
  if(active && active!==k) scrollPos[active]=content.scrollTop;
  active=k;
  document.querySelectorAll('.tabpanel').forEach(p=>p.classList.toggle('on',p.dataset.k===k));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.k===k));
  renderTabs();
  content.scrollTop=scrollPos[k]||0;
}
function openTab(k){
  if(!openTabs.includes(k)){
    if(openTabs.length>=MAX_TABS){toastT('Máximo '+MAX_TABS+' pestañas abiertas. Cierra alguna para abrir otra.');return;}
    openTabs.push(k);buildPanel(k);
  }
  switchTab(k);
}
function closeTab(k){
  const i=openTabs.indexOf(k);
  if(i<0||k==='panel')return;
  openTabs.splice(i,1);
  const p=document.querySelector(`.tabpanel[data-k="${k}"]`);if(p)p.remove();
  delete scrollPos[k];
  if(active===k) switchTab(openTabs[i]||openTabs[i-1]||'panel');
  else renderTabs();
}
function closeAll(){
  openTabs.filter(k=>k!=='panel').forEach(k=>{const p=document.querySelector(`.tabpanel[data-k="${k}"]`);if(p)p.remove();delete scrollPos[k];});
  openTabs=['panel'];switchTab('panel');
}
function closeOthers(keep){
  openTabs.filter(k=>k!=='panel'&&k!==keep).forEach(k=>{const p=document.querySelector(`.tabpanel[data-k="${k}"]`);if(p)p.remove();delete scrollPos[k];});
  openTabs=keep==='panel'?['panel']:['panel',keep];switchTab(keep);
}
function closeRight(from){
  const i=openTabs.indexOf(from);
  openTabs.slice(i+1).forEach(k=>{const p=document.querySelector(`.tabpanel[data-k="${k}"]`);if(p)p.remove();delete scrollPos[k];});
  openTabs=openTabs.slice(0,i+1);
  if(!openTabs.includes(active))switchTab(from);else renderTabs();
}

/* context menu */
function showCtx(e,k){
  e.preventDefault();
  const i=openTabs.indexOf(k);
  const hasRight=i<openTabs.length-1;
  const hasOthers=openTabs.filter(x=>x!=='panel'&&x!==k).length>0;
  const dis=k==='panel';
  ctxmenu.innerHTML=`
    <div class="ci ${dis?'disabled':''}" onclick="hideCtx();closeTab('${k}')">✕ Cerrar</div>
    <div class="ci ${hasOthers?'':'disabled'}" onclick="hideCtx();closeOthers('${k}')">Cerrar las demás</div>
    <div class="ci ${hasRight?'':'disabled'}" onclick="hideCtx();closeRight('${k}')">Cerrar las de la derecha</div>
    <div class="sep"></div>
    <div class="ci" onclick="hideCtx();closeAll()">Cerrar todas</div>`;
  ctxmenu.style.left=Math.min(e.clientX,window.innerWidth-210)+'px';
  ctxmenu.style.top=e.clientY+'px';
  ctxmenu.classList.add('on');
}
function hideCtx(){ctxmenu.classList.remove('on');}
document.addEventListener('click',hideCtx);
document.addEventListener('scroll',hideCtx,true);

/* drag to reorder */
let dragK=null;
function wireDrag(){
  document.querySelectorAll('.tab').forEach(t=>{
    t.addEventListener('dragstart',e=>{dragK=t.dataset.k;t.classList.add('dragging');});
    t.addEventListener('dragend',e=>{t.classList.remove('dragging');document.querySelectorAll('.tab').forEach(x=>x.classList.remove('dragover'));});
    t.addEventListener('dragover',e=>{e.preventDefault();if(t.dataset.k!==dragK)t.classList.add('dragover');});
    t.addEventListener('dragleave',e=>t.classList.remove('dragover'));
    t.addEventListener('drop',e=>{
      e.preventDefault();t.classList.remove('dragover');
      const from=openTabs.indexOf(dragK), to=openTabs.indexOf(t.dataset.k);
      if(from<0||to<0||from===to)return;
      openTabs.splice(to,0,openTabs.splice(from,1)[0]);
      renderTabs();
    });
  });
}

  {id:'p3',n:'Costillas BBQ',pr:62000,cat:'Fuertes',rec:1,e:'🍖'},
  {id:'p4',n:'Ensalada César',pr:22000,cat:'Entradas',e:'🥗',opts:[
    {t:'Proteína',type:'single',req:1,items:[{n:'Sin proteína',p:0},{n:'Pollo',p:6000},{n:'Camarón',p:12000}]}
  ]},
  {id:'p5',n:'Empanadas (x3)',pr:15000,cat:'Entradas',e:'🥟'},
  {id:'p6',n:'Papas Rústicas',pr:14000,cat:'Acompañam.',e:'🍟'},
  {id:'p7',n:'Arroz de la Casa',pr:10000,cat:'Acompañam.',e:'🍚'},
  {id:'p8',n:'Torta de Chocolate',pr:28000,cat:'Postres',rec:1,e:'🍫'},
  {id:'p9',n:'Cheesecake',pr:24000,cat:'Postres',e:'🍰'},
  {id:'p10',n:'Limonada Natural',pr:9000,cat:'Bebidas',e:'🍋',opts:[
    {t:'Tamaño',type:'single',req:1,items:[{n:'Vaso',p:0},{n:'Jarra (1L)',p:6000}]}
  ]},
  {id:'p11',n:'Café Americano',pr:6000,cat:'Bebidas',e:'☕'},
  {id:'p12',n:'Gaseosa',pr:6000,cat:'Bebidas',e:'🥤'},
];
let comanda=[], lineSeq=1, curCat='Recomendados', pendingProd=null, pendingSel={};

function pedidoView(){
  return `
  <div class="page-head"><h1>🧾 Nueva Comanda <span class="status-pill activo">Activo</span><span class="fase-tag">Capa 1 · demo</span></h1>
    <div class="sub">Arma la comanda y envíala a cocina. Los productos son de ejemplo; conectar con datos reales es la Capa 2.</div></div>
  <div class="tp">
    <div class="tp-ctx">
      <div class="mesa-sel"><span class="mm-ic">🍽️</span> Mesa 04 · Piso 1 <span style="color:var(--txt3);font-size:12px">▾</span></div>
      <div class="divx"></div>
      <div class="ctx-i">Comensales: <b>4</b></div>
      <div class="divx"></div>
      <div class="ctx-i">Mesero: <b>Sebastián</b></div>
      <div class="divx"></div>
      <div class="ctx-i">Estado: <b style="color:var(--amber)">Comanda abierta</b></div>
    </div>

    <div class="tp-left">
      <div class="tp-search2">🔎<input id="tpSearch" placeholder="Buscar producto por nombre…" oninput="renderProds()"></div>
      <div class="chips" id="tpChips"></div>
      <div class="prod-grid" id="tpProds"></div>
    </div>

    <div class="comanda">
      <div class="comanda-h"><b>🧾 Comanda</b><span class="cnt" id="cCount">0 ítems</span></div>
      <div class="comanda-body" id="cBody"></div>
      <div class="comanda-f" id="cFoot"></div>
    </div>
  </div>`;
}

function initPedido(){
  const chips=document.getElementById('tpChips');
  chips.innerHTML=CATS.map(c=>`<div class="chip${c===curCat?' active':''}" onclick="setCat('${c}')">${c}</div>`).join('');
  renderProds();renderComanda();
}
function setCat(c){curCat=c;document.querySelectorAll('#tpChips .chip').forEach(x=>x.classList.toggle('active',x.textContent===c));renderProds();}
function renderProds(){
  const q=(document.getElementById('tpSearch')?.value||'').toLowerCase().trim();
  let list=PRODUCTS.filter(p=>{
    const inCat = curCat==='Recomendados' ? p.rec : p.cat===curCat;
    const inQ = !q || p.n.toLowerCase().includes(q);
    return q ? inQ : inCat;
  });
  document.getElementById('tpProds').innerHTML = list.length ? list.map(p=>`
    <div class="prod" onclick="pick('${p.id}')">
      ${p.opts?'<span class="popt">opciones</span>':''}
      <div class="pe">${p.e}</div><div class="pn">${p.n}</div><div class="pp">${COP(p.pr)}</div>
      <div class="padd">+</div>
    </div>`).join('') : `<div class="empty" style="grid-column:1/-1"><div class="ee">🔍</div>Sin resultados</div>`;
}
function pick(id){
  const p=PRODUCTS.find(x=>x.id===id);
  if(p.opts){openOpts(p);} else {addLine(p,[]);}
}
function addLine(p,selOpts){
  const extra=selOpts.reduce((s,o)=>s+o.p,0);
  comanda.push({lid:lineSeq++,id:p.id,n:p.n,base:p.pr,qty:1,opts:selOpts,unit:p.pr+extra});
  renderComanda();toastT(p.n+' agregado a la comanda');
}
function changeQty(lid,d){const l=comanda.find(x=>x.lid===lid);if(!l)return;l.qty=Math.max(1,l.qty+d);renderComanda();}
function removeLine(lid){comanda=comanda.filter(x=>x.lid!==lid);renderComanda();}
function renderComanda(){
  const body=document.getElementById('cBody'),foot=document.getElementById('cFoot'),cnt=document.getElementById('cCount');
  const items=comanda.reduce((s,l)=>s+l.qty,0);
  cnt.textContent=items+(items===1?' ítem':' ítems');
  if(!comanda.length){
    body.innerHTML=`<div class="empty"><div class="ee">🧾</div>Toca un producto para agregarlo a la comanda.</div>`;
    foot.innerHTML=`<button class="btn primary" disabled>Enviar a cocina</button>`;return;
  }
  body.innerHTML=comanda.map(l=>{
    const optTxt=l.opts.map(o=>o.n+(o.p?` (+${COP(o.p)})`:'')).join(' · ');
    return `<div class="cl">
      <div class="cl-top"><div><div class="cl-name">${l.n}</div>${optTxt?`<div class="cl-opts">${optTxt}</div>`:''}</div><div class="cl-rm" onclick="removeLine(${l.lid})">✕</div></div>
      <div class="cl-bot"><div class="qstep"><div class="qb" onclick="changeQty(${l.lid},-1)">−</div><span class="qv">${l.qty}</span><div class="qb" onclick="changeQty(${l.lid},1)">+</div></div>
      <div class="cl-price">${COP(l.unit*l.qty)}</div></div></div>`;
  }).join('');
  const total=comanda.reduce((s,l)=>s+l.unit*l.qty,0);
  foot.innerHTML=`
    <div class="trow"><span>Subtotal</span><span>${COP(total)}</span></div>
    <div class="trow"><span>IVA incluido</span><span>—</span></div>
    <div class="trow tot"><span>TOTAL</span><span class="tv">${COP(total)}</span></div>
    <div class="comanda-actions">
      <button class="btn primary" onclick="enviarCocina()">🔥 Enviar a cocina</button>
      <div class="btn-row">
        <button class="btn ghost" onclick="toastT('Precuenta guardada')">💾 Precuenta</button>
        <button class="btn ghost" onclick="toastT('Enviando a facturación…')">🧾 Facturar</button>
      </div>
    </div>`;
}
function enviarCocina(){
  const items=comanda.reduce((s,l)=>s+l.qty,0);
  toastT(`✅ ${items} ítem(s) enviados a cocina · Mesa 04`);
  comanda=[];renderComanda();
}

/* OPTIONS MODAL */
function openOpts(p){
  pendingProd=p;pendingSel={};
  p.opts.forEach((g,gi)=>{if(g.type==='single'&&g.req)pendingSel[gi]=[0];else pendingSel[gi]=[];});
  const m=document.getElementById('optModal');
  m.innerHTML=`<div class="modal">
    <div class="modal-h"><b>${p.e} ${p.n}</b><div class="mx" onclick="closeOpts()">✕</div></div>
    <div class="modal-b" id="optBody"></div>
    <div class="modal-f"><button class="btn primary" onclick="confirmOpts()" id="optConfirm">Agregar · ${COP(p.pr)}</button></div>
  </div>`;
  m.classList.add('on');renderOpts();
}
function renderOpts(){
  const p=pendingProd;
  document.getElementById('optBody').innerHTML=p.opts.map((g,gi)=>`
    <div class="optgroup"><div class="ogt"><span>${g.t}</span>${g.req?'<span class="req">Obligatorio</span>':g.type==='multi'?'<span style="color:var(--txt3);font-weight:400;text-transform:none">Opcional · varios</span>':''}</div>
    ${g.items.map((it,ii)=>`<div class="opt${pendingSel[gi].includes(ii)?' sel':''}" onclick="toggleOpt(${gi},${ii})">
      <div style="display:flex;align-items:center;gap:11px"><div class="oc"></div>${it.n}</div>${it.p?`<span class="op">+${COP(it.p)}</span>`:''}</div>`).join('')}
    </div>`).join('');
  const extra=extraTotal();
  document.getElementById('optConfirm').textContent=`Agregar · ${COP(pendingProd.pr+extra)}`;
}
function toggleOpt(gi,ii){
  const g=pendingProd.opts[gi];
  if(g.type==='single'){pendingSel[gi]=[ii];}
  else{const arr=pendingSel[gi];const p=arr.indexOf(ii);p>-1?arr.splice(p,1):arr.push(ii);}
  renderOpts();
}
function extraTotal(){return pendingProd.opts.reduce((s,g,gi)=>s+pendingSel[gi].reduce((a,ii)=>a+g.items[ii].p,0),0);}
function confirmOpts(){
  const sel=[];pendingProd.opts.forEach((g,gi)=>pendingSel[gi].forEach(ii=>sel.push({n:g.items[ii].n,p:g.items[ii].p})));
  addLine(pendingProd,sel);closeOpts();
}
function closeOpts(){document.getElementById('optModal').classList.remove('on');}
document.getElementById('optModal').addEventListener('click',e=>{if(e.target.id==='optModal')closeOpts();});

buildPanel('panel');openTab('panel');
</script>
</body>
</html>
