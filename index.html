<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FENLORA CLOUD — Panel del Negocio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Figtree:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#080D1A;--surface:#0E1525;--card:#141E33;--card2:#1A2540;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);
  --primary:#00E5A0;--primary-dim:rgba(0,229,160,.12);--primary-dim2:rgba(0,229,160,.06);
  --amber:#F5A623;--amber-dim:rgba(245,166,35,.14);
  --red:#FF4D6D;--red-dim:rgba(255,77,109,.12);
  --blue:#3B82F6;--blue-dim:rgba(59,130,246,.12);
  --purple:#A78BFA;--purple-dim:rgba(167,139,250,.14);
  --txt:#F0F4FF;--txt2:#8892A4;--txt3:#4A5568;
  --sidebar-w:246px;--hdr:60px;
}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:'Figtree',sans-serif;overflow:hidden}
.app{display:flex;height:100vh}
.sidebar{width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;z-index:10}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.hdr{height:var(--hdr);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 26px;flex-shrink:0}
.content{flex:1;overflow-y:auto;padding:26px;scrollbar-width:thin;scrollbar-color:var(--card2) transparent}
.content::-webkit-scrollbar{width:8px}.content::-webkit-scrollbar-thumb{background:var(--card2);border-radius:8px}

/* TABS (browser-style) */
.tabstrip{display:flex;align-items:center;gap:3px;background:var(--surface);border-bottom:1px solid var(--border);padding:7px 12px 0;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
.tabstrip::-webkit-scrollbar{display:none}
.tab{display:flex;align-items:center;gap:8px;padding:9px 13px;border-radius:9px 9px 0 0;background:transparent;color:var(--txt2);font-size:12.5px;font-weight:500;cursor:pointer;white-space:nowrap;border:1px solid transparent;border-bottom:none;position:relative;top:1px;max-width:200px}
.tab:hover{background:var(--card);color:var(--txt)}
.tab.active{background:var(--bg);color:var(--txt);border-color:var(--border)}
.tab .ti{font-size:13px;flex-shrink:0}
.tab .tl{overflow:hidden;text-overflow:ellipsis}
.tab .tx{width:17px;height:17px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--txt3);flex-shrink:0}
.tab .tx:hover{background:var(--red-dim);color:var(--red)}
.tab .pin{font-size:11px;color:var(--txt3)}
.tab.dragging{opacity:.4}
.tab.dragover{border-left:2px solid var(--primary)}
.tab-actions{margin-left:auto;flex-shrink:0;padding-left:8px}
.closeall{display:flex;align-items:center;gap:6px;background:transparent;border:1px solid var(--border);color:var(--txt2);font-size:11.5px;font-weight:600;padding:6px 11px;border-radius:8px;cursor:pointer;white-space:nowrap;font-family:inherit;margin-bottom:6px}
.closeall:hover{border-color:var(--red);color:var(--red);background:var(--red-dim)}
.ctxmenu{position:fixed;z-index:200;background:var(--card);border:1px solid var(--border2);border-radius:10px;padding:5px;min-width:190px;box-shadow:0 16px 40px -10px rgba(0,0,0,.7);display:none}
.ctxmenu.on{display:block}
.ctxmenu .ci{padding:9px 12px;border-radius:7px;font-size:12.5px;color:var(--txt);cursor:pointer;display:flex;align-items:center;gap:9px}
.ctxmenu .ci:hover{background:var(--primary-dim);color:var(--primary)}
.ctxmenu .ci.disabled{color:var(--txt3);pointer-events:none;opacity:.5}
.ctxmenu .sep{height:1px;background:var(--border);margin:4px 6px}
.toast-t{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--card);border:1px solid var(--amber);color:var(--amber);font-size:13px;font-weight:600;padding:11px 20px;border-radius:11px;z-index:300;opacity:0;transition:.3s;pointer-events:none}
.toast-t.on{opacity:1;transform:translateX(-50%) translateY(0)}
.tabpanel{display:none}
.tabpanel.on{display:block}

/* ─── TOMAR PEDIDO ─── */
.tp{display:grid;grid-template-columns:1fr 350px;gap:20px;align-items:start}
.tp-ctx{grid-column:1/-1;display:flex;align-items:center;gap:16px;background:var(--card);border:1px solid var(--border);border-radius:13px;padding:13px 18px;margin-bottom:4px;flex-wrap:wrap}
.tp-ctx .mesa-sel{display:flex;align-items:center;gap:9px;font-family:'Outfit',sans-serif;font-weight:700;font-size:16px}
.tp-ctx .mesa-sel .mm-ic{width:32px;height:32px;border-radius:8px;background:var(--amber-dim);color:var(--amber);display:flex;align-items:center;justify-content:center;font-size:16px}
.tp-ctx .ctx-i{font-size:12px;color:var(--txt2)}.tp-ctx .ctx-i b{color:var(--txt);font-weight:600}
.tp-ctx .divx{width:1px;height:26px;background:var(--border)}
.tp-search2{display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:14px;color:var(--txt3)}
.tp-search2 input{background:none;border:none;outline:none;color:var(--txt);font-family:inherit;font-size:14px;flex:1}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.chip{padding:8px 15px;border-radius:22px;background:var(--card);border:1px solid var(--border);color:var(--txt2);font-size:12.5px;font-weight:600;cursor:pointer;transition:.15s}
.chip:hover{border-color:var(--border2);color:var(--txt)}
.chip.active{background:var(--primary);border-color:var(--primary);color:#052e21}
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(146px,1fr));gap:12px}
.prod{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:14px;cursor:pointer;transition:.15s;position:relative}
.prod:hover{transform:translateY(-2px);border-color:var(--primary);background:var(--card2)}
.prod:active{transform:scale(.97)}
.prod .pe{font-size:30px;margin-bottom:8px}
.prod .pn{font-size:13px;font-weight:600;line-height:1.2;min-height:32px}
.prod .pp{font-family:'Outfit',sans-serif;font-size:15px;font-weight:700;color:var(--primary);margin-top:6px}
.prod .popt{position:absolute;top:10px;right:10px;font-size:9px;font-weight:700;background:var(--amber-dim);color:var(--amber);padding:2px 7px;border-radius:10px}
.prod .padd{position:absolute;bottom:14px;right:12px;width:26px;height:26px;border-radius:50%;background:var(--primary-dim);color:var(--primary);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:300;line-height:0}

/* COMANDA panel */
.comanda{position:sticky;top:0;background:var(--card);border:1px solid var(--border);border-radius:16px;display:flex;flex-direction:column;max-height:calc(100vh - 150px)}
.comanda-h{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.comanda-h b{font-family:'Outfit',sans-serif;font-size:15px;font-weight:700}
.comanda-h .cnt{font-size:11px;color:var(--txt2);background:var(--card2);padding:3px 9px;border-radius:12px;font-weight:600}
.comanda-body{flex:1;overflow-y:auto;padding:12px 14px;scrollbar-width:thin}
.comanda-body::-webkit-scrollbar{width:6px}.comanda-body::-webkit-scrollbar-thumb{background:var(--card2);border-radius:6px}
.empty{text-align:center;color:var(--txt3);padding:40px 20px;font-size:13px}
.empty .ee{font-size:40px;margin-bottom:12px;opacity:.5}
.cl{background:var(--card2);border:1px solid var(--border);border-radius:11px;padding:11px 12px;margin-bottom:9px}
.cl-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.cl-name{font-size:13px;font-weight:600;line-height:1.2}
.cl-opts{font-size:10.5px;color:var(--txt2);margin-top:3px;line-height:1.4}
.cl-rm{color:var(--txt3);cursor:pointer;font-size:13px;flex-shrink:0}.cl-rm:hover{color:var(--red)}
.cl-bot{display:flex;align-items:center;justify-content:space-between;margin-top:9px}
.qstep{display:flex;align-items:center;gap:9px}
.qb{width:25px;height:25px;border-radius:7px;border:1px solid var(--border);background:var(--surface);color:var(--txt);font-size:15px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.qb:hover{border-color:var(--primary);color:var(--primary)}
.qv{font-size:13px;font-weight:700;min-width:14px;text-align:center}
.cl-price{font-family:'Outfit',sans-serif;font-weight:700;font-size:14px;color:var(--primary)}
.comanda-f{border-top:1px solid var(--border);padding:14px 18px}
.trow{display:flex;justify-content:space-between;font-size:12.5px;color:var(--txt2);margin-bottom:7px}
.trow.tot{font-family:'Outfit',sans-serif;font-size:19px;font-weight:700;color:var(--txt);border-top:1px solid var(--border);padding-top:10px;margin-top:3px}
.trow.tot .tv{color:var(--primary)}
.comanda-actions{display:flex;flex-direction:column;gap:8px;margin-top:14px}
.btn{padding:12px;border-radius:10px;border:none;font-family:'Outfit',sans-serif;font-weight:700;font-size:13.5px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:.15s}
.btn:active{transform:scale(.98)}
.btn.primary{background:var(--primary);color:#052e21}
.btn.primary:hover{box-shadow:0 8px 20px -6px rgba(0,229,160,.5)}
.btn.ghost{background:var(--card2);color:var(--txt);border:1px solid var(--border)}
.btn.ghost:hover{border-color:var(--border2)}
.btn.two{flex-direction:row}
.btn-row{display:flex;gap:8px}.btn-row .btn{flex:1}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* OPTIONS MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:150;display:none;align-items:center;justify-content:center;padding:20px}
.modal-bg.on{display:flex}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:16px;width:440px;max-width:100%;max-height:88vh;display:flex;flex-direction:column;box-shadow:0 30px 70px -15px rgba(0,0,0,.7)}
.modal-h{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-h b{font-family:'Outfit',sans-serif;font-size:17px;font-weight:700}
.modal-h .mx{width:32px;height:32px;border-radius:8px;background:var(--card);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--txt2)}
.modal-b{padding:18px 20px;overflow-y:auto}
.optgroup{margin-bottom:20px}
.optgroup .ogt{font-size:12px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:var(--txt2);margin-bottom:10px;display:flex;justify-content:space-between}
.optgroup .req{color:var(--amber);font-size:10px}
.opt{display:flex;align-items:center;justify-content:space-between;padding:11px 13px;border:1px solid var(--border);border-radius:10px;margin-bottom:8px;cursor:pointer;font-size:13.5px;transition:.15s}
.opt:hover{border-color:var(--border2)}
.opt.sel{border-color:var(--primary);background:var(--primary-dim)}
.opt .oc{width:19px;height:19px;border-radius:50%;border:2px solid var(--txt3);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.opt.sel .oc{border-color:var(--primary);background:var(--primary)}
.opt.sel .oc::after{content:'';width:7px;height:7px;border-radius:50%;background:#052e21}
.opt .op{color:var(--primary);font-weight:600;font-size:12.5px}
.modal-f{padding:16px 20px;border-top:1px solid var(--border)}

/* COMANDAS: type filters + mesa map */
.comtypes{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.comtype{display:flex;align-items:center;gap:8px;padding:10px 16px;border-radius:11px;background:var(--card);border:1px solid var(--border);color:var(--txt2);font-size:13px;font-weight:600;cursor:pointer;transition:.15s}
.comtype:hover{border-color:var(--border2);color:var(--txt)}
.comtype.active{background:var(--primary-dim);border-color:var(--primary);color:var(--primary)}
.comtype .ct-badge{background:var(--card2);color:var(--txt2);font-size:11px;font-weight:700;padding:1px 8px;border-radius:10px}
.comtype.active .ct-badge{background:var(--primary);color:#052e21}
.mesas-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.mesas-head b{font-family:'Outfit',sans-serif;font-size:15px}
.mesa-map{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px}
.mesa{border-radius:15px;padding:18px;color:#fff;cursor:pointer;position:relative;min-height:118px;transition:.15s;border:1px solid transparent}
.mesa:hover{transform:translateY(-3px);box-shadow:0 14px 30px -12px rgba(0,0,0,.6)}
.mesa:active{transform:scale(.98)}
.mesa.libre{background:linear-gradient(140deg,#12a56f,#0b7d53)}
.mesa.ocup{background:linear-gradient(140deg,#d98a1f,#b06b11)}
.mesa.cobr{background:linear-gradient(140deg,#d0384f,#9e2739)}
.mesa .mesa-ic{position:absolute;top:14px;right:15px;font-size:18px;opacity:.5}
.mesa .mesa-n{font-family:'Outfit',sans-serif;font-weight:700;font-size:18px;margin-top:6px}
.mesa .mesa-s{font-size:11.5px;opacity:.92;margin-top:4px}
.mesa .mesa-m{position:absolute;bottom:16px;left:18px;font-family:'Outfit',sans-serif;font-weight:700;font-size:16px}
.empty-type{text-align:center;padding:50px 20px;background:var(--card);border:1px dashed var(--border2);border-radius:16px}
.empty-type .et-ic{font-size:48px;margin-bottom:14px}
.empty-type .et-t{font-family:'Outfit',sans-serif;font-size:18px;font-weight:700}
.empty-type .et-d{font-size:13px;color:var(--txt2);margin-top:6px;max-width:340px;margin-left:auto;margin-right:auto;line-height:1.5}
.cl.sent{opacity:.6}
.cl.sent .cl-name{color:var(--primary)}
.cl.held{border-style:dashed;border-color:var(--amber)}
.cl-hold{font-size:10.5px;color:var(--amber);cursor:pointer;font-weight:700;margin-right:10px}
.cl-hold:hover{text-decoration:underline}
.held-tag{font-size:9px;background:var(--amber-dim);color:var(--amber);padding:1px 7px;border-radius:10px;font-weight:700;vertical-align:middle}
.unir-bar{background:var(--card2);border:1px solid var(--primary);border-radius:12px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;margin-top:16px;font-size:13px;font-weight:600}
.mesa.sel{outline:3px solid var(--primary);outline-offset:2px}

/* BRAND */
.brand{padding:20px 20px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:11px}
.brand .logo{width:36px;height:36px;border-radius:9px;background:linear-gradient(135deg,var(--primary),#00b381);display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.brand-name{font-family:'Outfit',sans-serif;font-weight:800;font-size:16px;letter-spacing:-.3px}
.brand-sub{font-size:10px;color:var(--primary);letter-spacing:1.4px;text-transform:uppercase;margin-top:1px}

/* NAV */
.nav{padding:12px 10px;flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--card2) transparent}
.nav::-webkit-scrollbar{width:6px}.nav::-webkit-scrollbar-thumb{background:var(--card2);border-radius:6px}
.nav-section{font-size:10px;color:var(--txt3);letter-spacing:1.2px;text-transform:uppercase;padding:14px 10px 6px;font-weight:700}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--txt2);transition:.15s;margin-bottom:1px;font-weight:500;position:relative}
.nav-item:hover{background:var(--primary-dim2);color:var(--txt)}
.nav-item.active{background:var(--primary-dim);color:var(--primary)}
.nav-item .ico{width:17px;text-align:center;font-size:14px;flex-shrink:0}
.nav-item .lbl{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dot.activo{background:var(--primary);box-shadow:0 0 6px var(--primary)}
.dot.construccion{background:var(--amber)}
.dot.pronto{background:var(--txt3)}
.nav-badge{background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px}

/* HEADER */
.hdr-left{display:flex;align-items:center;gap:14px}
.biz-sel{display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--border);border-radius:9px;padding:7px 13px;cursor:pointer;font-size:13px;font-weight:600}
.biz-sel .bl{width:24px;height:24px;border-radius:6px;background:linear-gradient(135deg,#F5A623,#c9761e);display:flex;align-items:center;justify-content:center;font-size:13px}
.biz-sel .cv{color:var(--txt3);font-size:11px}
.search{display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--border);border-radius:9px;padding:8px 13px;width:280px;color:var(--txt3);font-size:13px}
.search input{background:none;border:none;outline:none;color:var(--txt);font-family:inherit;font-size:13px;flex:1}
.hdr-right{display:flex;align-items:center;gap:12px}
.hicon{width:38px;height:38px;border-radius:9px;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;position:relative}
.hicon:hover{border-color:var(--border2)}
.hicon .rd{position:absolute;top:8px;right:9px;width:7px;height:7px;background:var(--red);border-radius:50%;border:2px solid var(--surface)}
.avatar{width:38px;height:38px;border-radius:9px;background:linear-gradient(135deg,var(--primary),#00b381);display:flex;align-items:center;justify-content:center;font-weight:700;color:#062;cursor:pointer}

/* PAGE HEAD */
.page-head{margin-bottom:22px}
.page-head h1{font-family:'Outfit',sans-serif;font-size:24px;font-weight:700;letter-spacing:-.4px;display:flex;align-items:center;gap:12px}
.page-head .sub{color:var(--txt2);font-size:13.5px;margin-top:4px}
.status-pill{font-size:10.5px;font-weight:700;padding:4px 10px;border-radius:20px;letter-spacing:.4px;text-transform:uppercase}
.status-pill.activo{background:var(--primary-dim);color:var(--primary)}
.status-pill.construccion{background:var(--amber-dim);color:var(--amber)}
.status-pill.pronto{background:rgba(255,255,255,.06);color:var(--txt2)}
.fase-tag{font-size:10.5px;font-weight:600;padding:4px 10px;border-radius:20px;background:var(--card2);color:var(--txt2)}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 18px;position:relative;overflow:hidden}
.kpi .kt{font-size:11.5px;color:var(--txt2);font-weight:600;letter-spacing:.2px;display:flex;align-items:center;gap:6px}
.kpi .kv{font-family:'Outfit',sans-serif;font-size:25px;font-weight:700;margin-top:8px;letter-spacing:-.5px}
.kpi .kd{font-size:11.5px;margin-top:5px;font-weight:600}
.kpi .kd.up{color:var(--primary)}.kpi .kd.down{color:var(--red)}.kpi .kd.n{color:var(--txt2)}
.kpi .kico{position:absolute;top:14px;right:16px;font-size:17px;opacity:.5}
.kpi.hl{border-color:rgba(0,229,160,.3);background:linear-gradient(135deg,var(--primary-dim),var(--card))}

/* QUICK ACCESS */
.section-title{font-family:'Outfit',sans-serif;font-size:15px;font-weight:600;margin:26px 0 14px;color:var(--txt);display:flex;align-items:center;gap:9px}
.qa-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px}
.qa{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:16px 12px;text-align:center;cursor:pointer;transition:.16s}
.qa:hover{transform:translateY(-2px);border-color:var(--border2);background:var(--card2)}
.qa .qi{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;margin:0 auto 9px}
.qa .qn{font-size:12px;font-weight:600;color:var(--txt)}
.qa .qs{font-size:9.5px;margin-top:3px}

/* PLACEHOLDER (module not built yet) */
.ph{max-width:720px}
.ph-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px}
.ph-desc{color:var(--txt2);font-size:14px;line-height:1.65;margin-bottom:22px}
.ph-feat-title{font-size:12px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--txt3);margin-bottom:12px}
.ph-feat{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ph-feat .f{display:flex;align-items:flex-start;gap:10px;font-size:13px;color:var(--txt);background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:11px 13px}
.ph-feat .f .fc{color:var(--primary);flex-shrink:0;font-size:13px;margin-top:1px}
.ph-note{margin-top:22px;padding:14px 16px;background:var(--amber-dim);border:1px solid rgba(245,166,35,.25);border-radius:11px;font-size:13px;color:#f5cf8f;display:flex;gap:11px;align-items:flex-start}

/* mini table for mesas preview on dashboard */
.mini-mesas{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:11px}
.mm{border-radius:12px;padding:14px;color:#fff;position:relative;min-height:78px}
.mm.libre{background:linear-gradient(135deg,#12a56f,#0c7d54)}
.mm.ocup{background:linear-gradient(135deg,#d98a1f,#b56e12)}
.mm.cobr{background:linear-gradient(135deg,#c9384f,#9e2739)}
.mm .mn{font-weight:700;font-size:14px}
.mm .ms{font-size:10.5px;opacity:.9;margin-top:2px}

/* ═══ COMANDA v2 (estilo ApiWorking, tema oscuro) ═══ */
.tp{grid-template-columns:1fr 438px !important}
.tp-toolbar{display:flex;gap:10px;align-items:center;margin-bottom:14px}
.tp-toolbar .tp-search2{margin-bottom:0;flex:1}
.view-toggle{display:flex;background:var(--card);border:1px solid var(--border);border-radius:9px;overflow:hidden;flex-shrink:0}
.view-toggle button{background:none;border:none;color:var(--txt3);padding:9px 12px;cursor:pointer;font-size:15px;font-family:inherit}
.view-toggle button.on{background:var(--primary-dim);color:var(--primary)}

/* vista lista */
.prod-list{display:flex;flex-direction:column;gap:7px}
.prow{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--border);border-radius:11px;padding:11px 14px;cursor:pointer;transition:.13s}
.prow:hover{border-color:var(--primary);background:var(--card2)}
.prow .pe2{font-size:22px;flex-shrink:0}
.prow .pn2{flex:1;font-size:13.5px;font-weight:600}
.prow .popt2{font-size:9px;font-weight:700;background:var(--amber-dim);color:var(--amber);padding:2px 8px;border-radius:10px}
.prow .pp2{font-family:'Outfit',sans-serif;font-weight:700;color:var(--primary);font-size:14px}
.prow .padd2{width:26px;height:26px;border-radius:50%;background:var(--primary-dim);color:var(--primary);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:300;flex-shrink:0}

/* meta bar de la comanda */
.comanda-meta{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;flex-wrap:wrap;gap:9px;align-items:center;font-size:11.5px;color:var(--txt2)}
.cm-field{display:flex;align-items:center;gap:6px}
.cm-field select{background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--txt);font-family:inherit;font-size:11.5px;padding:5px 8px;outline:none;cursor:pointer;max-width:130px}
.cm-com{display:flex;align-items:center;gap:7px}
.cm-com .qb{width:22px;height:22px;font-size:14px}
.ver-mesas{background:var(--card2);border:1px solid var(--border);color:var(--txt);font-size:11px;font-weight:700;padding:6px 11px;border-radius:8px;cursor:pointer;font-family:'Outfit',sans-serif}
.ver-mesas:hover{border-color:var(--primary);color:var(--primary)}

/* línea rica */
.cl-head{display:flex;gap:9px;align-items:flex-start}
.cl-acc{display:flex;flex-direction:column;gap:4px;flex-shrink:0}
.accb{width:26px;height:26px;border-radius:7px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:12.5px;display:flex;align-items:center;justify-content:center;padding:0;line-height:0}
.accb.b1{color:var(--blue)}.accb.b1:hover{background:var(--blue-dim);border-color:var(--blue)}
.accb.b2{color:var(--red)}.accb.b2:hover{background:var(--red-dim);border-color:var(--red)}
.accb.b3{color:var(--primary)}.accb.b3:hover{background:var(--primary-dim);border-color:var(--primary)}
.accb.b3.on{background:var(--primary);color:#052e21;border-color:var(--primary)}
.cl-info{flex:1;min-width:0}
.cl-notes{font-size:10.5px;color:var(--amber);font-style:italic;margin-top:4px;line-height:1.35}
.cl-area{display:inline-block;font-size:8.5px;font-weight:700;letter-spacing:.4px;background:var(--card);color:var(--txt3);border:1px solid var(--border);padding:1px 6px;border-radius:8px;margin-top:5px}
.cort-tag{font-size:9px;background:var(--primary-dim);color:var(--primary);padding:1px 7px;border-radius:10px;font-weight:700;vertical-align:middle}
.sent-tag{font-size:9px;background:var(--primary-dim);color:var(--primary);padding:1px 7px;border-radius:10px;font-weight:700;vertical-align:middle}
.cl.cort{border-color:rgba(0,229,160,.3)}
.cl-ctrl{display:flex;align-items:center;gap:8px;margin-top:10px;flex-wrap:wrap}
.cl-pricebox{display:flex;align-items:center;gap:3px;background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:3px 7px;font-size:12px;color:var(--txt3)}
.cl-price-in{width:62px;background:none;border:none;outline:none;color:var(--primary);font-family:'Outfit',sans-serif;font-weight:700;font-size:12.5px;text-align:right}
.cl-imp{font-family:'Outfit',sans-serif;font-weight:700;font-size:13px;color:var(--txt);margin-left:auto}
.cl-pos{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--txt3)}
.cl-pos-sel{background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--txt);font-family:inherit;font-size:11px;padding:3px 4px;outline:none;cursor:pointer}
.cl-static-q{font-size:11px;color:var(--txt3)}

/* footer: comensal + obs */
.cf-fields{display:flex;flex-direction:column;gap:7px;margin-bottom:12px}
.cf-in{display:flex;align-items:center;gap:8px;background:var(--card2);border:1px solid var(--border);border-radius:9px;padding:8px 11px}
.cf-in .lb{font-size:11px;color:var(--txt3);flex-shrink:0;min-width:74px}
.cf-in input{flex:1;background:none;border:none;outline:none;color:var(--txt);font-family:inherit;font-size:12.5px}
.trow.cortr{color:var(--primary)}

/* 4 botones de guardado */
.save-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.sbtn{padding:11px 10px;border-radius:10px;border:1px solid var(--border);font-family:'Outfit',sans-serif;font-weight:700;font-size:12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;transition:.14s;line-height:1.15;text-align:center;background:var(--card2);color:var(--txt)}
.sbtn:hover{border-color:var(--border2);transform:translateY(-1px)}
.sbtn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.sbtn .si{font-size:15px}
.sbtn.prod{background:var(--amber-dim);border-color:rgba(245,166,35,.35);color:var(--amber)}
.sbtn.fact{background:var(--primary);border-color:var(--primary);color:#052e21}
.sbtn.fact:hover{box-shadow:0 8px 18px -6px rgba(0,229,160,.5)}
.sec-row{display:flex;gap:7px;margin-top:8px}
.sec-row .btn{flex:1;padding:9px;font-size:11.5px}

/* mesa acciones */
.mesa-act{position:absolute;top:12px;left:14px;width:26px;height:26px;border-radius:7px;background:rgba(0,0,0,.28);border:none;color:#fff;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:0;padding:0}
.mesa-act:hover{background:rgba(0,0,0,.5)}
.amb-title{font-family:'Outfit',sans-serif;font-size:14px;font-weight:700;margin:20px 0 12px;display:flex;align-items:center;gap:9px;color:var(--txt)}
.amb-title:first-of-type{margin-top:0}
.amb-cnt{font-size:11px;color:var(--txt2);background:var(--card2);padding:2px 9px;border-radius:11px;font-weight:600}
.act-list{display:flex;flex-direction:column;gap:8px}
.act-item{display:flex;align-items:center;gap:12px;background:var(--card2);border:1px solid var(--border);border-radius:11px;padding:13px 15px;cursor:pointer;font-size:13.5px;font-weight:600;color:var(--txt);transition:.14s}
.act-item:hover{border-color:var(--primary);background:var(--primary-dim)}
.act-item .ai{font-size:17px;width:22px;text-align:center}
.act-item.danger:hover{border-color:var(--red);background:var(--red-dim);color:var(--red)}

/* notas modal */
.note-unit{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:13px;margin-bottom:12px}
.note-unit .nut{font-size:11px;font-weight:700;letter-spacing:.4px;color:var(--txt2);text-transform:uppercase;margin-bottom:9px}
.note-in{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:10px 12px;color:var(--txt);font-family:inherit;font-size:13px;outline:none;margin-bottom:10px}
.note-in:focus{border-color:var(--primary)}
.qn-lbl{font-size:10.5px;color:var(--txt3);margin-bottom:7px}
.qn-row{display:flex;flex-wrap:wrap;gap:6px}
.qn-btn{font-size:11px;font-weight:700;letter-spacing:.3px;background:var(--surface);border:1px solid var(--border);color:var(--txt2);padding:6px 11px;border-radius:8px;cursor:pointer;transition:.13s;font-family:inherit}
.qn-btn:hover{border-color:var(--border2);color:var(--txt)}
.qn-btn.on{background:var(--amber);border-color:var(--amber);color:#3a2a06}
.note-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
.note-tag{font-size:10.5px;background:var(--amber-dim);color:var(--amber);padding:3px 9px;border-radius:9px;font-weight:600;display:flex;align-items:center;gap:6px}
.note-tag .rmx{cursor:pointer;opacity:.7}.note-tag .rmx:hover{opacity:1}

/* pago modal */
.pay-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:18px}
.pay-m{background:var(--card2);border:1px solid var(--border);border-radius:11px;padding:14px 8px;text-align:center;cursor:pointer;transition:.14s}
.pay-m:hover{border-color:var(--border2)}
.pay-m.on{border-color:var(--primary);background:var(--primary-dim)}
.pay-m .pmi{font-size:22px}
.pay-m .pml{font-size:11.5px;font-weight:600;margin-top:5px;color:var(--txt)}
.pay-sec{font-size:11px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:var(--txt3);margin:6px 0 9px}
.tip-row{display:flex;gap:7px;margin-bottom:16px;flex-wrap:wrap}
.tip-b{flex:1;min-width:52px;background:var(--card2);border:1px solid var(--border);border-radius:9px;padding:9px 6px;text-align:center;cursor:pointer;font-size:12px;font-weight:700;color:var(--txt);transition:.13s}
.tip-b:hover{border-color:var(--border2)}
.tip-b.on{border-color:var(--primary);background:var(--primary-dim);color:var(--primary)}
.disc-in{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:9px;padding:10px 12px;color:var(--txt);font-family:inherit;font-size:13px;outline:none;margin-bottom:16px}
.disc-in:focus{border-color:var(--primary)}
.pay-sum{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:6px}

/* tickets impresos */
.ticket-wrap{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;max-height:52vh;overflow-y:auto;padding:4px}
.ticket{background:#fff;color:#111;border-radius:6px;padding:16px 18px;width:270px;font-family:'Courier New',monospace;font-size:11.5px;line-height:1.5;box-shadow:0 8px 24px -8px rgba(0,0,0,.6)}
.ticket .tk-c{text-align:center}
.ticket .tk-b{font-weight:700}
.ticket .tk-big{font-size:15px;font-weight:700}
.ticket .tk-hr{border-top:1px dashed #999;margin:8px 0}
.ticket .tk-row{display:flex;justify-content:space-between;gap:8px}
.ticket .tk-note{font-style:italic;font-size:10px;color:#444;padding-left:10px}
.ticket .tk-foot{text-align:center;font-size:9.5px;color:#666;margin-top:8px}
.print-actions{display:flex;gap:9px;flex-wrap:wrap;justify-content:center;margin-top:6px}

/* ── FIX: comanda hace scroll como una sola columna (no oculta la lista) ── */
.comanda{overflow:hidden;max-height:calc(100vh - 118px)}
.comanda-scroll{flex:1;min-height:0;overflow-y:auto;display:flex;flex-direction:column;scrollbar-width:thin;scrollbar-color:var(--card2) transparent}
.comanda-scroll::-webkit-scrollbar{width:6px}.comanda-scroll::-webkit-scrollbar-thumb{background:var(--card2);border-radius:6px}
.comanda-body{flex:none !important;overflow:visible !important}
.comanda-meta{position:sticky;top:0;background:var(--card);z-index:3}

/* ── Módulo Mesas / QR / NFC ── */
.qr-layout{display:grid;grid-template-columns:1fr 320px;gap:20px;align-items:start;margin-bottom:6px}
.qr-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px}
.qr-card h3{font-family:'Outfit',sans-serif;font-size:15px;font-weight:700;margin-bottom:4px}
.qr-card .qsub{font-size:12.5px;color:var(--txt2);margin-bottom:16px;line-height:1.5}
.opt-toggle{display:flex;align-items:center;gap:13px;padding:12px 14px;border:1px solid var(--border);border-radius:12px;margin-bottom:10px;background:var(--card2);cursor:pointer;transition:.14s}
.opt-toggle:hover{border-color:var(--border2)}
.opt-toggle .oi{width:38px;height:38px;border-radius:10px;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.opt-toggle .ot{flex:1;min-width:0}
.opt-toggle .ot b{font-size:13.5px;font-weight:600;display:block}
.opt-toggle .ot span{font-size:11px;color:var(--txt2)}
.sw{width:44px;height:25px;border-radius:20px;background:var(--card);border:1px solid var(--border2);position:relative;flex-shrink:0;transition:.18s}
.sw::after{content:'';position:absolute;top:2px;left:2px;width:19px;height:19px;border-radius:50%;background:var(--txt3);transition:.18s}
.opt-toggle.on .sw{background:var(--primary);border-color:var(--primary)}
.opt-toggle.on .sw::after{left:22px;background:#052e21}
.opt-toggle.on{border-color:rgba(0,229,160,.3)}
.phone{width:272px;margin:0 auto;background:#0a0f1c;border:8px solid #1a2035;border-radius:34px;padding:14px 13px 20px;box-shadow:0 20px 50px -15px rgba(0,0,0,.7)}
.phone-notch{width:88px;height:5px;background:#2a3350;border-radius:6px;margin:2px auto 14px}
.phone-brand{text-align:center;margin-bottom:16px}
.phone-brand .pb-logo{width:50px;height:50px;border-radius:14px;background:linear-gradient(135deg,var(--primary),#00b381);display:flex;align-items:center;justify-content:center;font-size:25px;margin:0 auto 8px}
.phone-brand .pb-n{font-family:'Outfit',sans-serif;font-weight:700;font-size:15px}
.phone-brand .pb-m{font-size:11px;color:var(--txt2)}
.phone-btn{display:flex;align-items:center;gap:11px;background:var(--card2);border:1px solid var(--border);border-radius:13px;padding:12px 14px;margin-bottom:9px;font-size:13px;font-weight:600;color:var(--txt)}
.phone-btn .pbi{font-size:18px}
.phone-btn.primary{background:var(--primary);color:#052e21;border-color:var(--primary)}
.phone-empty{text-align:center;color:var(--txt3);font-size:11px;padding:24px 10px;line-height:1.5}
.qr-mesa-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(158px,1fr));gap:12px;margin-bottom:8px}
.qr-mesa{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:14px}
.qr-mesa .qm-n{font-family:'Outfit',sans-serif;font-weight:700;font-size:15px}
.qr-mesa .qm-cap{font-size:10.5px;color:var(--txt2);margin-top:3px}
.qr-mesa .qm-mini{width:100%;aspect-ratio:1;background:#fff;border-radius:9px;margin:11px 0;padding:9px;overflow:hidden}
.qr-mesa .qm-acts{display:flex;gap:7px}
.qr-mesa .qm-acts button{flex:1;background:var(--card2);border:1px solid var(--border);color:var(--txt);font-size:11px;font-weight:700;padding:7px 4px;border-radius:8px;cursor:pointer;font-family:inherit}
.qr-mesa .qm-acts button:hover{border-color:var(--primary);color:var(--primary)}
.qr-big{width:200px;height:200px;background:#fff;border-radius:14px;padding:13px;margin:0 auto 14px}
.cfg-field{margin-bottom:14px}
.cfg-field .cl-lb{font-size:12px;color:var(--txt2);margin-bottom:6px}
.cfg-in{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:9px;padding:10px 12px;color:var(--txt);font-family:inherit;font-size:13px;outline:none}
.cfg-in:focus{border-color:var(--primary)}
@media(max-width:1180px){.qr-layout{grid-template-columns:1fr}}

const content=document.getElementById('content');
const tabbar=document.getElementById('tabbar');
const ctxmenu=document.getElementById('ctxmenu');
const MAX_TABS=8;
let openTabs=['panel'], active=null;
const scrollPos={};
const tName=k=>k==='panel'?'Panel':(DYN[k]?DYN[k].title:S[k].n);
const tIco =k=>k==='panel'?'📊':(DYN[k]?DYN[k].ico:S[k].ico);

function toastT(msg){
  const t=document.getElementById('toastT');t.textContent=msg;t.classList.add('on');
  clearTimeout(window._tt);window._tt=setTimeout(()=>t.classList.remove('on'),2200);
}

function renderTabs(){
  const closable=openTabs.filter(k=>k!=='panel').length;
  tabbar.innerHTML=openTabs.map((k,idx)=>`
    <div class="tab${k===active?' active':''}" draggable="true" data-idx="${idx}" data-k="${k}"
      onclick="switchTab('${k}')"
      onauxclick="if(event.button===1){event.preventDefault();closeTab('${k}')}"
      oncontextmenu="showCtx(event,'${k}')">
      <span class="ti">${tIco(k)}</span><span class="tl">${tName(k)}</span>
      ${k==='panel'?'<span class="pin">📌</span>':`<span class="tx" onclick="event.stopPropagation();closeTab('${k}')">✕</span>`}
    </div>`).join('') + (closable>0?`<div class="tab-actions"><button class="closeall" onclick="closeAll()">✕ Cerrar todas</button></div>`:'');
  wireDrag();
}
function buildPanel(k){
  const d=document.createElement('div');d.className='tabpanel';d.dataset.k=k;
  d.innerHTML = k==='panel' ? dashboard() : k==='mesas' ? comandasView() : k==='ambientes' ? qrConfigView() : (DYN[k] ? DYN[k].render() : moduleView(k));
  content.appendChild(d);
  if(k==='mesas') initComandas();
  else if(k==='ambientes') initQrConfig();
  else if(DYN[k]) DYN[k].init();
}
function switchTab(k){
  if(active && active!==k) scrollPos[active]=content.scrollTop;
  active=k;
  document.querySelectorAll('.tabpanel').forEach(p=>p.classList.toggle('on',p.dataset.k===k));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.k===k));
  renderTabs();
  if(k==='mesas' && document.getElementById('comContent')) renderComContent();
  content.scrollTop=scrollPos[k]||0;
}
function openTab(k){
  if(!openTabs.includes(k)){
    if(openTabs.length>=MAX_TABS){toastT('Máximo '+MAX_TABS+' pestañas abiertas. Cierra alguna para abrir otra.');return;}
    openTabs.push(k);buildPanel(k);
  }
  switchTab(k);
}
function closeTab(k){
  const i=openTabs.indexOf(k);
  if(i<0||k==='panel')return;
  openTabs.splice(i,1);
  const p=document.querySelector(`.tabpanel[data-k="${k}"]`);if(p)p.remove();
  delete scrollPos[k];
  if(active===k) switchTab(openTabs[i]||openTabs[i-1]||'panel');
  else renderTabs();
}
function closeAll(){
  openTabs.filter(k=>k!=='panel').forEach(k=>{const p=document.querySelector(`.tabpanel[data-k="${k}"]`);if(p)p.remove();delete scrollPos[k];});
  openTabs=['panel'];switchTab('panel');
}
function closeOthers(keep){
  openTabs.filter(k=>k!=='panel'&&k!==keep).forEach(k=>{const p=document.querySelector(`.tabpanel[data-k="${k}"]`);if(p)p.remove();delete scrollPos[k];});
  openTabs=keep==='panel'?['panel']:['panel',keep];switchTab(keep);
}
function closeRight(from){
  const i=openTabs.indexOf(from);
  openTabs.slice(i+1).forEach(k=>{const p=document.querySelector(`.tabpanel[data-k="${k}"]`);if(p)p.remove();delete scrollPos[k];});
  openTabs=openTabs.slice(0,i+1);
  if(!openTabs.includes(active))switchTab(from);else renderTabs();
}

/* context menu */
function showCtx(e,k){
  e.preventDefault();
  const i=openTabs.indexOf(k);
  const hasRight=i<openTabs.length-1;
  const hasOthers=openTabs.filter(x=>x!=='panel'&&x!==k).length>0;
  const dis=k==='panel';
  ctxmenu.innerHTML=`
    <div class="ci ${dis?'disabled':''}" onclick="hideCtx();closeTab('${k}')">✕ Cerrar</div>
    <div class="ci ${hasOthers?'':'disabled'}" onclick="hideCtx();closeOthers('${k}')">Cerrar las demás</div>
    <div class="ci ${hasRight?'':'disabled'}" onclick="hideCtx();closeRight('${k}')">Cerrar las de la derecha</div>
    <div class="sep"></div>
    <div class="ci" onclick="hideCtx();closeAll()">Cerrar todas</div>`;
  ctxmenu.style.left=Math.min(e.clientX,window.innerWidth-210)+'px';
  ctxmenu.style.top=e.clientY+'px';
  ctxmenu.classList.add('on');
}
function hideCtx(){ctxmenu.classList.remove('on');}
document.addEventListener('click',hideCtx);
document.addEventListener('scroll',hideCtx,true);

/* drag to reorder */
let dragK=null;
function wireDrag(){
  document.querySelectorAll('.tab').forEach(t=>{
    t.addEventListener('dragstart',e=>{dragK=t.dataset.k;t.classList.add('dragging');});
    t.addEventListener('dragend',e=>{t.classList.remove('dragging');document.querySelectorAll('.tab').forEach(x=>x.classList.remove('dragover'));});
    t.addEventListener('dragover',e=>{e.preventDefault();if(t.dataset.k!==dragK)t.classList.add('dragover');});
    t.addEventListener('dragleave',e=>t.classList.remove('dragover'));
    t.addEventListener('drop',e=>{
      e.preventDefault();t.classList.remove('dragover');
      const from=openTabs.indexOf(dragK), to=openTabs.indexOf(t.dataset.k);
      if(from<0||to<0||from===to)return;
      openTabs.splice(to,0,openTabs.splice(from,1)[0]);
      renderTabs();
    });
  });
}

function initOrder(target){

}
function setView(target,mode){viewMode=mode;
  const g=document.getElementById('vg_'+target),l=document.getElementById('vl_'+target);
  if(g)g.classList.toggle('on',mode==='grid'); if(l)l.classList.toggle('on',mode==='list');
  renderProds(target);
}
function setCat(target,c){ORDCAT[target]=c;document.querySelectorAll('#chips_'+target+' .chip').forEach(x=>x.classList.toggle('active',x.textContent===c));renderProds(target);}
function prodList(target){
  const q=norm(document.getElementById('search_'+target)?.value||'');
  const cat=ORDCAT[target];
  return PRODUCTS.filter(p=>{const inCat=cat==='Recomendados'?p.rec:p.cat===cat;return q?norm(p.n).includes(q):inCat;});
}
function renderProds(target){
  const cont=document.getElementById('prods_'+target); if(!cont)return;
  const list=prodList(target);
  if(!list.length){cont.className='prod-grid';cont.innerHTML=`<div class="empty" style="grid-column:1/-1"><div class="ee">🔍</div>Sin resultados</div>`;return;}
  if(viewMode==='list'){
    cont.className='prod-list';
    cont.innerHTML=list.map(p=>`<div class="prow" onclick="pick('${target}','${p.id}')">
      <span class="pe2">${p.e}</span><span class="pn2">${p.n}</span>${p.opts?'<span class="popt2">opciones</span>':''}<span class="pp2">${COP(p.pr)}</span><span class="padd2">+</span></div>`).join('');
  } else {
    cont.className='prod-grid';
    cont.innerHTML=list.map(p=>`<div class="prod" onclick="pick('${target}','${p.id}')">${p.opts?'<span class="popt">opciones</span>':''}
      <div class="pe">${p.e}</div><div class="pn">${p.n}</div><div class="pp">${COP(p.pr)}</div><div class="padd">+</div></div>`).join('');
  }
}
function searchEnter(target,e){
  if(e.key!=='Enter')return;
  const list=prodList(target);
  if(list.length){ pick(target,list[0].id); const inp=document.getElementById('search_'+target); if(inp)inp.value=''; renderProds(target); }
  else toastT('No se encontró el producto');
}
function pick(target,id){const p=PRODUCTS.find(x=>x.id===id);if(p.opts){openOpts(target,p);}else{addLine(target,p,[]);}}
function addLine(target,p,sel){
  const extra=sel.reduce((s,o)=>s+o.p,0);
  ORD[target].push({lid:LID++,id:p.id,n:p.n,qty:1,opts:sel,unit:p.pr+extra,sent:false,held:false,cort:false,area:p.area||'COCINA',notes:[[]]});
  renderComanda(target);syncMesa(target);toastT('Se agregó '+p.n+' a la comanda');
}
function changeQty(target,lid,d){
  const l=ORD[target].find(x=>x.lid===lid);
  if(l&&!l.sent){
    l.qty=Math.max(1,l.qty+d);
    while(l.notes.length<l.qty)l.notes.push([]);
    while(l.notes.length>l.qty)l.notes.pop();
    renderComanda(target);syncMesa(target);
  }
}
function delLine(target,lid){
  const l=ORD[target].find(x=>x.lid===lid); if(!l)return;
  if(l.sent){const mot=prompt('Este plato ya fue enviado a producción.\nMotivo de anulación:');if(!mot)return;toastT('Anulado: '+l.n+' — '+mot);}
  ORD[target]=ORD[target].filter(x=>x.lid!==lid);
  renderComanda(target);syncMesa(target);
}
function toggleHold(target,lid){const l=ORD[target].find(x=>x.lid===lid);if(l&&!l.sent){l.held=!l.held;renderComanda(target);}}
function toggleCort(target,lid){const l=ORD[target].find(x=>x.lid===lid);if(l){l.cort=!l.cort;toastT(l.cort?'🎁 Cortesía: '+l.n:'Cortesía quitada');renderComanda(target);syncMesa(target);}}
function changePrice(target,lid,v){const l=ORD[target].find(x=>x.lid===lid);if(!l)return;const n=parseInt((v+'').replace(/\D/g,''))||0;l.unit=n;renderComanda(target);syncMesa(target);}
function setPos(target,lid,v){
  const lines=ORD[target];const from=lines.findIndex(x=>x.lid===lid);const to=Math.max(0,Math.min(lines.length-1,(+v)-1));
  if(from<0||from===to)return;lines.splice(to,0,lines.splice(from,1)[0]);renderComanda(target);
}
function noteStr(l){
  return l.notes.map((arr,i)=>arr.length?((l.qty>1?('U'+(i+1)+': '):'')+arr.join(', ')):'').filter(Boolean).join('   ·   ');
}
function renderComanda(target){
  const body=document.getElementById('cbody_'+target),foot=document.getElementById('cfoot_'+target),cnt=document.getElementById('ccount_'+target);
  if(!body)return;
  const lines=ORD[target];const items=lines.reduce((s,l)=>s+l.qty,0);
  cnt.textContent=items+(items===1?' ítem':' ítems');
  if(!lines.length){
    body.innerHTML=`<div class="empty"><div class="ee">🧾</div>Toca un producto para agregarlo a la comanda.</div>`;
    foot.innerHTML=`<div class="save-grid">
      <button class="sbtn" disabled><span class="si">💾</span>Grabar</button>
      <button class="sbtn prod" disabled><span class="si">🔥</span>Enviar a Producción</button>
      <button class="sbtn" disabled><span class="si">🧾</span>Enviar Comanda</button>
      <button class="sbtn fact" disabled><span class="si">💵</span>Facturar y Grabar</button></div>`;
    return;
  }
  body.innerHTML=lines.map((l,idx)=>{
    const o=l.opts.map(x=>x.n+(x.p?` (+${COP(x.p)})`:'')).join(' · ');
    const ns=noteStr(l);
    const tags=(l.held?' <span class="held-tag">retenido</span>':'')+(l.cort?' <span class="cort-tag">cortesía</span>':'')+(l.sent?' <span class="sent-tag">en cocina</span>':'');
    const acc=`<div class="cl-acc">
      <button class="accb b1" title="Notas / observación por unidad" onclick="openNotes('${target}',${l.lid})">🗒️</button>
      <button class="accb b2" title="Quitar / anular" onclick="delLine('${target}',${l.lid})">🗑️</button>
      <button class="accb b3 ${l.cort?'on':''}" title="Cortesía (no se cobra)" onclick="toggleCort('${target}',${l.lid})">🎁</button></div>`;
    const qty=l.sent?`<span class="cl-static-q">Cant: ${l.qty}</span>`:`<div class="qstep"><div class="qb" onclick="changeQty('${target}',${l.lid},-1)">−</div><span class="qv">${l.qty}</span><div class="qb" onclick="changeQty('${target}',${l.lid},1)">+</div></div>`;
    const price=l.sent?`<div class="cl-pricebox" style="opacity:.6">$ <span class="cl-price-in">${l.unit.toLocaleString('es-CO')}</span></div>`:`<div class="cl-pricebox">$ <input class="cl-price-in" value="${l.unit.toLocaleString('es-CO')}" onchange="changePrice('${target}',${l.lid},this.value)"></div>`;
    const posSel=`<div class="cl-pos">Pos <select class="cl-pos-sel" onchange="setPos('${target}',${l.lid},this.value)">${lines.map((_,i)=>`<option value="${i+1}" ${i===idx?'selected':''}>${i+1}</option>`).join('')}</select></div>`;
    const hold=l.sent?'':`<span class="cl-hold" onclick="toggleHold('${target}',${l.lid})">${l.held?'▶ enviar':'⏸ retener'}</span>`;
    return `<div class="cl${l.sent?' sent':''}${l.held?' held':''}${l.cort?' cort':''}">
      <div class="cl-head">${acc}
        <div class="cl-info">
          <div class="cl-name">${l.n}${tags}</div>
          ${o?`<div class="cl-opts">${o}</div>`:''}
          ${ns?`<div class="cl-notes">📝 ${ns}</div>`:''}
          <span class="cl-area">🍳 ${l.area}</span>
        </div></div>
      <div class="cl-ctrl">${qty}${price}<div class="cl-imp">${COP(l.unit*l.qty)}</div>${posSel}${hold}</div></div>`;
  }).join('');
  const meta=ORDMETA[target]||{};
  const subtotal=lines.reduce((s,l)=>s+l.unit*l.qty,0);
  const cortAmt=lines.filter(l=>l.cort).reduce((s,l)=>s+l.unit*l.qty,0);
  const total=subtotal-cortAmt;
  const pend=lines.filter(l=>!l.sent&&!l.held).length;
  const held=lines.filter(l=>l.held).length;
  foot.innerHTML=`
    <div class="cf-fields">
      <div class="cf-in"><span class="lb">👤 Comensal</span><input placeholder="Nombre del cliente (opcional)" value="${(meta.cliente||'').replace(/"/g,'&quot;')}" onchange="setCliente('${target}',this.value)"></div>
      <div class="cf-in"><span class="lb">📝 Observación</span><input placeholder="Observación general de la comanda" value="${(meta.obs||'').replace(/"/g,'&quot;')}" onchange="setObs('${target}',this.value)"></div>
    </div>
    <div class="trow"><span>Subtotal</span><span>${COP(subtotal)}</span></div>
    ${cortAmt?`<div class="trow cortr"><span>Cortesías</span><span>− ${COP(cortAmt)}</span></div>`:''}

/* ── cobro / facturación ── */
function openPay(target){
  const lines=ORD[target]; if(!lines.length){toastT('La comanda está vacía');return;}
  payTarget=target; pay={m:null,tip:0,disc:0};
  renderPay();
  document.getElementById('payModal').classList.add('on');
}
function payTotals(){
  const lines=ORD[payTarget];
  const subtotal=lines.filter(l=>!l.cort).reduce((s,l)=>s+l.unit*l.qty,0);
  const tipAmt=Math.round(subtotal*pay.tip/100);
  const disc=pay.disc||0;
  const total=Math.max(0,subtotal+tipAmt-disc);
  return {subtotal,tipAmt,disc,total};
}
function renderPay(){
  const t=payTotals();
  const m=document.getElementById('payModal');
  m.innerHTML=`<div class="modal" style="width:460px">
    <div class="modal-h"><b>💵 Cobrar · ${DYN[payTarget].title}</b><div class="mx" onclick="closePay()">✕</div></div>
    <div class="modal-b">
      <div class="pay-sec">Medio de pago</div>
      <div class="pay-grid">${PAGOS.map(p=>`<div class="pay-m ${pay.m===p[0]?'on':''}" onclick="payMethod('${p[0]}')"><div class="pmi">${p[1]}</div><div class="pml">${p[2]}</div></div>`).join('')}</div>
      <div class="pay-sec">Propina</div>
      <div class="tip-row">${TIPS.map(pc=>`<div class="tip-b ${pay.tip===pc?'on':''}" onclick="setTip(${pc})">${pc===0?'Sin propina':pc+'%'}</div>`).join('')}</div>
      <div class="pay-sec">Descuento (COP)</div>
      <input class="disc-in" inputmode="numeric" placeholder="0" value="${pay.disc||''}" oninput="setDisc(this.value)">
      <div class="pay-sum">
        <div class="trow"><span>Subtotal</span><span>${COP(t.subtotal)}</span></div>
        ${t.tipAmt?`<div class="trow"><span>Propina (${pay.tip}%)</span><span>+ ${COP(t.tipAmt)}</span></div>`:''}
        ${t.disc?`<div class="trow"><span>Descuento</span><span>− ${COP(t.disc)}</span></div>`:''}
        <div class="trow tot"><span>TOTAL A COBRAR</span><span class="tv">${COP(t.total)}</span></div>
      </div>
    </div>
    <div class="modal-f"><button class="btn primary" id="payConfirm" ${pay.m?'':'disabled'} onclick="confirmPay()">🧾 Generar Comprobante DIAN</button></div></div>`;
}
function payMethod(m){pay.m=m;renderPay();}
function setTip(p){pay.tip=p;renderPay();}
function setDisc(v){pay.disc=parseInt((v+'').replace(/\D/g,''))||0;const t=payTotals();
  const el=document.querySelector('#payModal .pay-sum');if(el){el.innerHTML=`<div class="trow"><span>Subtotal</span><span>${COP(t.subtotal)}</span></div>${t.tipAmt?`<div class="trow"><span>Propina (${pay.tip}%)</span><span>+ ${COP(t.tipAmt)}</span></div>`:''}${t.disc?`<div class="trow"><span>Descuento</span><span>− ${COP(t.disc)}</span></div>`:''}<div class="trow tot"><span>TOTAL A COBRAR</span><span class="tv">${COP(t.total)}</span></div>`;}
}
function confirmPay(){
  if(!pay.m){toastT('Elige un medio de pago');return;}
  const t=payTotals();const target=payTarget;const label=(PAGOS.find(p=>p[0]===pay.m)||[])[2];
  closePay();
  toastT(`🧾 Comprobante DIAN generado · ${COP(t.total)} en ${label} · ${DYN[target].title}`);
  if(target.startsWith('mesa_')){target.replace('mesa_','').split('_').forEach(x=>{const m=getMesa(+x);if(m){m.est='libre';m.t='';m.m=0;m.merged=false;}});}
  delete ORD[target];delete ORDMETA[target];delete ORDCAT[target];
  closeTab(target);
}
function closePay(){document.getElementById('payModal').classList.remove('on');}
document.getElementById('payModal').addEventListener('click',e=>{if(e.target.id==='payModal')closePay();});

function splitEqual(target){

      <div style="display:flex;align-items:center;justify-content:center;gap:20px">

function splitMonto(target){

  window._sm=(v)=>{const p=parseInt((v+'').replace(/\D/g,''))||0;const el=document.querySelector('#smRest .tv');if(el)el.textContent=COP(Math.max(0,total-p));};

function closeSplit(){document.getElementById('splitModal').classList.remove('on');}
document.getElementById('splitModal').addEventListener('click',e=>{if(e.target.id==='splitModal')closeSplit();});

/* ── notas por producto (modal por unidad) ── */
function openNotes(target,lid){
  notesTarget=target;notesLid=lid;
  renderNotes();
  document.getElementById('notesModal').classList.add('on');
}
function curLine(){return ORD[notesTarget].find(x=>x.lid===notesLid);}
function renderNotes(){
  const l=curLine(); if(!l)return;
  const p=PRODUCTS.find(x=>x.id===l.id)||{};
  const qn=p.qn||QN_DEFAULT;
  const units=[];
  for(let i=0;i<l.qty;i++){
    const tags=l.notes[i]||[];
    units.push(`<div class="note-unit">
      <div class="nut">Notas${l.qty>1?' · unidad '+(i+1):''}</div>
      <input class="note-in" placeholder="Escribe notas separadas por COMA y presiona ENTER" onkeydown="noteEnter(${i},event)">
      <div class="qn-lbl">Clic para añadir:</div>
      <div class="qn-row">${qn.map(q=>`<button class="qn-btn ${tags.includes(q)?'on':''}" onclick="qnToggle(${i},'${q.replace(/'/g,"\\'")}')">${q}</button>`).join('')}</div>
      ${tags.length?`<div class="note-tags">${tags.map((tg,ti)=>`<span class="note-tag">${tg}<span class="rmx" onclick="rmTag(${i},${ti})">✕</span></span>`).join('')}</div>`:''}
    </div>`);
  }
  const m=document.getElementById('notesModal');
  m.innerHTML=`<div class="modal" style="width:470px">
    <div class="modal-h"><b>🗒️ Notas: ${l.n}</b><div class="mx" onclick="closeNotes()">✕</div></div>
    <div class="modal-b">${units.join('')}</div>
    <div class="modal-f"><button class="btn primary" onclick="closeNotes()">✓ Guardar notas</button></div></div>`;
}
function qnToggle(i,tag){const l=curLine();if(!l)return;if(!l.notes[i])l.notes[i]=[];const a=l.notes[i];const p=a.indexOf(tag);p>-1?a.splice(p,1):a.push(tag);renderNotes();}
function noteEnter(i,e){if(e.key!=='Enter')return;e.preventDefault();const l=curLine();if(!l)return;if(!l.notes[i])l.notes[i]=[];
  (e.target.value||'').split(',').map(s=>s.trim()).filter(Boolean).forEach(t=>{if(!l.notes[i].includes(t))l.notes[i].push(t);});
  e.target.value='';renderNotes();}
function rmTag(i,ti){const l=curLine();if(!l)return;l.notes[i].splice(ti,1);renderNotes();}
function closeNotes(){document.getElementById('notesModal').classList.remove('on');renderComanda(notesTarget);}

}
function doMoveComanda(from,to){
  const fk='mesa_'+from,tk='mesa_'+to;
  ORD[tk]=ORD[fk]||[];ORDMETA[tk]=ORDMETA[fk]||{};ORDCAT[tk]=ORDCAT[fk]||'Recomendados';
  delete ORD[fk];delete ORDMETA[fk];delete ORDCAT[fk];
  const mf=getMesa(from),mt=getMesa(to);
  const tot=ORD[tk].filter(l=>!l.cort).reduce((s,l)=>s+l.unit*l.qty,0);
  if(mf){mf.est='libre';mf.t='';mf.m=0;} if(mt){mt.est='ocup';mt.t='ahora';mt.m=tot;}

}

function doMoverPlatos(target){
  const sel=window._movSel||{};const ids=Object.keys(sel).filter(k=>sel[k]).map(Number);
  if(!ids.length){toastT('Marca al menos un plato');return;}
  const to=+document.getElementById('movDest').value;const tk='mesa_'+to;
  if(!ORD[tk]){ORD[tk]=[];ORDCAT[tk]='Recomendados';ORDMETA[tk]=Object.assign({com:2,mesero:'Sebastián',almacen:'Almacén principal',cliente:'',obs:'',num:'22600'+String(1000+(ordNumSeq++))+'-1'});}
  const move=ORD[target].filter(l=>ids.includes(l.lid));
  ORD[target]=ORD[target].filter(l=>!ids.includes(l.lid));
  move.forEach(l=>ORD[tk].push(l));
  const mt=getMesa(to);if(mt){mt.est='ocup';mt.t='ahora';mt.m=ORD[tk].filter(l=>!l.cort).reduce((s,l)=>s+l.unit*l.qty,0);}
  closeMove();renderComanda(target);syncMesa(target);
  toastT(ids.length+' plato(s) trasladado(s) a Mesa '+pad(to));
}
function closeMove(){document.getElementById('moveModal').classList.remove('on');}
document.getElementById('moveModal').addEventListener('click',e=>{if(e.target.id==='moveModal')closeMove();});

/* ── options modal (variantes/adicionales) ── */
function openOpts(target,p){
  pendingTarget=target;pendingProd=p;pendingSel={};
  p.opts.forEach((g,gi)=>{pendingSel[gi]=(g.type==='single'&&g.req)?[0]:[];});
  const m=document.getElementById('optModal');
  m.innerHTML=`<div class="modal"><div class="modal-h"><b>${p.e} ${p.n}</b><div class="mx" onclick="closeOpts()">✕</div></div>
    <div class="modal-b" id="optBody"></div><div class="modal-f"><button class="btn primary" id="optConfirm" onclick="confirmOpts()">Agregar</button></div></div>`;
  m.classList.add('on');renderOpts();
}
function renderOpts(){const p=pendingProd;
  document.getElementById('optBody').innerHTML=p.opts.map((g,gi)=>`<div class="optgroup"><div class="ogt"><span>${g.t}</span>${g.req?'<span class="req">Obligatorio</span>':g.type==='multi'?'<span style="color:var(--txt3);font-weight:400;text-transform:none">Opcional · varios</span>':''}</div>
    ${g.items.map((it,ii)=>`<div class="opt${pendingSel[gi].includes(ii)?' sel':''}" onclick="toggleOpt(${gi},${ii})"><div style="display:flex;align-items:center;gap:11px"><div class="oc"></div>${it.n}</div>${it.p?`<span class="op">+${COP(it.p)}</span>`:''}</div>`).join('')}</div>`).join('');
  document.getElementById('optConfirm').textContent='Agregar · '+COP(pendingProd.pr+extraTotal());
}
function toggleOpt(gi,ii){const g=pendingProd.opts[gi];if(g.type==='single'){pendingSel[gi]=[ii];}else{const a=pendingSel[gi],p=a.indexOf(ii);p>-1?a.splice(p,1):a.push(ii);}renderOpts();}
function extraTotal(){return pendingProd.opts.reduce((s,g,gi)=>s+pendingSel[gi].reduce((a,ii)=>a+g.items[ii].p,0),0);}
function confirmOpts(){const sel=[];pendingProd.opts.forEach((g,gi)=>pendingSel[gi].forEach(ii=>sel.push({n:g.items[ii].n,p:g.items[ii].p})));addLine(pendingTarget,pendingProd,sel);closeOpts();}
function closeOpts(){document.getElementById('optModal').classList.remove('on');}
document.getElementById('optModal').addEventListener('click',e=>{if(e.target.id==='optModal')closeOpts();});

/* ═══ MÓDULO: MESAS, QR y NFC + Experiencia del cliente (QR) ═══ */
let QROPTS={carta:true,mesero:true,cuenta:true,autoped:false,resena:false};
const QR_OPTIONS=[
  ['carta','📖','Ver la carta / Menú digital','Fotos, precios y descripciones de tus platos'],
  ['mesero','🙋','Llamar al mesero','Manda un aviso al panel indicando la mesa'],
  ['cuenta','🧾','Pedir la cuenta','El cliente solicita la cuenta desde el celular'],
  ['autoped','🛒','Auto-pedido','El cliente arma y envía su pedido solo (llega a cocina)'],
  ['resena','⭐','Reseña / Club VIP','Al terminar, invita a dejar reseña o unirse al Club VIP'],
];
const QLINK=n=>'pos.fenloravisual.com/m/el-fogon/'+pad(n);

function pseudoQR(seed){
  const N=21,cell=100/N;let s=(seed*7919+13)%233280;
  const rnd=()=>{s=(s*9301+49297)%233280;return s/233280;};
  const finder=(x,y)=>{let r='';for(let i=0;i<7;i++)for(let j=0;j<7;j++){const edge=i===0||i===6||j===0||j===6;const core=i>=2&&i<=4&&j>=2&&j<=4;if(edge||core)r+=`<rect x="${(x+i)*cell}" y="${(y+j)*cell}" width="${cell}" height="${cell}"/>`;}return r;};
  let rects='';
  for(let i=0;i<N;i++)for(let j=0;j<N;j++){const inF=(i<8&&j<8)||(i>N-9&&j<8)||(i<8&&j>N-9);if(inF)continue;if(rnd()>0.52)rects+=`<rect x="${i*cell}" y="${j*cell}" width="${cell}" height="${cell}"/>`;}
  rects+=finder(0,0)+finder(N-7,0)+finder(0,N-7);
  return `<svg viewBox="0 0 100 100" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg"><rect width="100" height="100" fill="#fff"/><g fill="#0b1020">${rects}</g></svg>`;
}
function qrConfigView(){
  return `
  <div class="page-head"><h1>🪑 Mesas, QR y NFC <span class="status-pill activo">Activo</span><span class="fase-tag">Configuración</span></h1>
    <div class="sub">Configura tus mesas, su código QR/NFC y qué puede hacer el cliente al escanear. Esto se conecta con tu Carta / Menú QR.</div></div>
  <div class="qr-layout">
    <div class="qr-card">
      <h3>🙋 Experiencia del cliente (QR)</h3>
      <div class="qsub">Esto es lo que ve el comensal cuando escanea el QR de la mesa. Activa o desactiva cada opción; el celular de la derecha muestra en vivo cómo le queda.</div>
      <div id="qrOpts"></div>
    </div>
    <div class="qr-card" style="padding:16px">
      <div class="qsub" style="text-align:center;margin-bottom:12px">📱 Vista previa · lo que ve el cliente</div>
      <div id="qrPhone"></div>
    </div>
  </div>
  <div class="section-title">🗺️ Ambientes y mesas <button class="btn ghost" style="width:auto;padding:8px 13px;margin-left:auto" onclick="genMesas()">➕ Generar mesas</button></div>
  <div id="qrMesas"></div>`;
}
function initQrConfig(){renderQrOpts();renderQrPhone();renderQrMesas();}
function renderQrOpts(){
  const el=document.getElementById('qrOpts');if(!el)return;
  el.innerHTML=QR_OPTIONS.map(o=>`<div class="opt-toggle ${QROPTS[o[0]]?'on':''}" onclick="toggleQrOpt('${o[0]}')">
    <div class="oi">${o[1]}</div><div class="ot"><b>${o[2]}</b><span>${o[3]}</span></div><div class="sw"></div></div>`).join('');
}
function toggleQrOpt(k){QROPTS[k]=!QROPTS[k];renderQrOpts();renderQrPhone();}
function renderQrPhone(){
  const el=document.getElementById('qrPhone');if(!el)return;
  const btns=[];
  if(QROPTS.carta)btns.push(['📖','Ver la carta',1]);
  if(QROPTS.autoped)btns.push(['🛒','Hacer mi pedido',0]);
  if(QROPTS.mesero)btns.push(['🙋','Llamar al mesero',0]);
  if(QROPTS.cuenta)btns.push(['🧾','Pedir la cuenta',0]);
  if(QROPTS.resena)btns.push(['⭐','Dejar reseña',0]);
  el.innerHTML=`<div class="phone"><div class="phone-notch"></div>
    <div class="phone-brand"><div class="pb-logo">🍖</div><div class="pb-n">El Fogón</div><div class="pb-m">Mesa 04 · Sede Centro</div></div>
    ${btns.length?btns.map(b=>`<div class="phone-btn ${b[2]?'primary':''}"><span class="pbi">${b[0]}</span>${b[1]}</div>`).join(''):'<div class="phone-empty">Activa al menos una opción para que el cliente vea algo al escanear.</div>'}
  </div>`;
}
function renderQrMesas(){
  const el=document.getElementById('qrMesas');if(!el)return;
  el.innerHTML=AMBIENTES.map(amb=>{
    const ms=MESAS.filter(m=>m.piso===amb.n);if(!ms.length)return '';
    return `<div class="amb-title">🍴 ${amb.n} <span class="amb-cnt">${ms.length} mesas</span></div>
      <div class="qr-mesa-grid">${ms.map(m=>`
        <div class="qr-mesa"><div class="qm-n">MESA ${pad(m.n)}</div><div class="qm-cap">👥 ${m.cap||4} personas · 📶 NFC</div>
          <div class="qm-mini">${pseudoQR(m.n)}</div>
          <div class="qm-acts"><button onclick="openQrView(${m.n})">🔍 Ver QR</button><button onclick="openMesaCfg(${m.n})">⚙️ Config</button></div>
        </div>`).join('')}</div>`;
  }).join('');
}
function genMesas(){toastT('Generador de mesas en masa (demo) — se conecta en Fase 1');}
function openQrView(n){
  const m=document.getElementById('qrModal');
  m.innerHTML=`<div class="modal" style="width:340px"><div class="modal-h"><b>📱 QR · Mesa ${pad(n)}</b><div class="mx" onclick="closeQr()">✕</div></div>
    <div class="modal-b"><div class="qr-big">${pseudoQR(n)}</div>
      <div class="cfg-field"><div class="cl-lb">Enlace del cliente</div><input class="cfg-in" readonly value="${QLINK(n)}"></div>
      <div style="font-size:11.5px;color:var(--txt2);text-align:center">El cliente escanea o acerca el celular (NFC) y abre esta experiencia.</div></div>
    <div class="modal-f"><div class="print-actions">
      <button class="btn ghost" style="width:auto;padding:11px 16px" onclick="toastT('Enlace copiado')">🔗 Copiar enlace</button>
      <button class="btn primary" style="width:auto;padding:11px 16px" onclick="toastT('QR descargado (demo)')">⬇️ Descargar QR</button></div></div></div>`;
  m.classList.add('on');
}
function openMesaCfg(n){
  const mm=getMesa(n);const m=document.getElementById('qrModal');
  m.innerHTML=`<div class="modal" style="width:420px"><div class="modal-h"><b>⚙️ Configurar Mesa ${pad(n)}</b><div class="mx" onclick="closeQr()">✕</div></div>
    <div class="modal-b">
      <div class="cfg-field"><div class="cl-lb">Ambiente / piso</div>
        <select class="cfg-in">${AMBIENTES.map(a=>`<option ${a.n===mm.piso?'selected':''}>${a.n}</option>`).join('')}</select></div>
      <div class="cfg-field"><div class="cl-lb">Capacidad (personas)</div><input class="cfg-in" type="number" value="${mm.cap||4}" min="1"></div>
      <div class="cfg-field"><div class="cl-lb">Enlace QR del cliente</div><input class="cfg-in" readonly value="${QLINK(n)}"></div>
      <div class="opt-toggle on" onclick="this.classList.toggle('on')"><div class="oi">📶</div><div class="ot"><b>NFC activo</b><span>El cliente abre la carta acercando el celular</span></div><div class="sw"></div></div>
      <div class="opt-toggle" onclick="this.classList.toggle('on')"><div class="oi">🔒</div><div class="ot"><b>Opciones propias de esta mesa</b><span>Si se apaga, usa la config general de arriba</span></div><div class="sw"></div></div>
    </div>
    <div class="modal-f"><button class="btn primary" onclick="toastT('Mesa ${pad(n)} guardada');closeQr()">Guardar mesa</button></div></div>`;
  m.classList.add('on');
}
function closeQr(){document.getElementById('qrModal').classList.remove('on');}
document.getElementById('qrModal').addEventListener('click',e=>{if(e.target.id==='qrModal')closeQr();});

buildPanel('panel');openTab('panel');
</script>
